\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px;\">\n      <div class=\"col-card\">\n        <div class=\"h\">/clear<\u002Fdiv>\n        <div class=\"v\">Wipe the desk.<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 28px;\">Use <strong>between phases<\u002Fstrong> — Plan → Build → Verify.<\u002Fp>\n        <svg viewBox=\"0 0 460 120\" style=\"width: 100%; margin-top: 18px;\">\n          <rect x=\"0\" y=\"0\" width=\"200\" height=\"120\" rx=\"10\" fill=\"#fbdcd8\"><\u002Frect>\n          <text x=\"100\" y=\"60\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">▓▓▓ messy<\u002Ftext>\n          <text x=\"100\" y=\"90\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">▓▓▓ ▓▓▓<\u002Ftext>\n          <text x=\"230\" y=\"65\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"28\" font-weight=\"700\" fill=\"#FC6C54\">→<\u002Ftext>\n          <rect x=\"260\" y=\"0\" width=\"200\" height=\"120\" rx=\"10\" fill=\"#d8f3e2\"><\u002Frect>\n          <text x=\"360\" y=\"68\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">AGENTS.md<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h\">/compact<\u002Fdiv>\n        <div class=\"v\">Squeeze into a summary.<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 28px;\">Use when you need <strong>continuity.<\u002Fstrong><\u002Fp>\n        <svg viewBox=\"0 0 460 120\" style=\"width: 100%; margin-top: 18px;\">\n          <rect x=\"0\" y=\"0\" width=\"200\" height=\"120\" rx=\"10\" fill=\"#fbdcd8\"><\u002Frect>\n          <text x=\"100\" y=\"60\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">▓▓▓ long<\u002Ftext>\n          <text x=\"100\" y=\"90\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">▓▓▓ ▓▓▓<\u002Ftext>\n          <text x=\"230\" y=\"65\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"28\" font-weight=\"700\" fill=\"#FC6C54\">→<\u002Ftext>\n          <rect x=\"260\" y=\"0\" width=\"200\" height=\"120\" rx=\"10\" fill=\"#fef6cc\"><\u002Frect>\n          <text x=\"360\" y=\"55\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">summary<\u002Ftext>\n          <text x=\"360\" y=\"85\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">+ AGENTS.md<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"small\" style=\"margin-top: 30px;\">Also worth knowing: <span class=\"kbd\">/context<\u002Fspan> · <span class=\"kbd\">claude -c<\u002Fspan> resume · <span class=\"kbd\">Esc Esc<\u002Fspan> undo.<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 14 WHY CONTEXT MATTERS ============= -->\n<section data-label=\"14 Why context matters\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">The through-line<\u002Fdiv>\n    <h1 class=\"title\">Everything today answers one question.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"pullquote\" style=\"margin-top: 20px;\">\n      How do I keep her context <span class=\"orange\">clean<\u002Fspan> and <span class=\"orange\">high-signal?<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t\" style=\"margin-top: 60px;\">\n      <tbody>\n        <tr><td><strong>AGENTS.md<\u002Fstrong><\u002Ftd><td>Always-loaded brief. Keep ≤150 lines so it doesn't crowd the desk.<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Skills<\u002Fstrong><\u002Ftd><td>Pulled in only when needed. ~80 tokens of description vs 8K body.<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Subagents<\u002Fstrong><\u002Ftd><td>Own desk. Return summary. Your desk stays clean.<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Hooks<\u002Fstrong><\u002Ftd><td>Run outside the LLM. Zero tokens.<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Plan Mode<\u002Fstrong><\u002Ftd><td>Read-only fresh desk, then a clean handoff to Build.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 14b VALIDATION ============= -->\n<section data-label=\"14b Validation is everything\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">The unspoken precondition<\u002Fdiv>\n    <h1 class=\"title\">If you can't test it, <span class=\"orange\">you can't ship it with an agent.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <p class=\"body\" style=\"font-size: 32px; max-width: 1500px; margin-top: 8px;\">An agent works in a tight loop: write code → run tests → read the result → adjust. No tests, no loop. The agent guesses, you babysit. <strong>Validation is the foundation, not an afterthought.<\u002Fstrong><\u002Fp>\n    <div class=\"cols cols-3\" style=\"margin-top: 44px; gap: 28px;\">\n      <div class=\"col-card\">\n        <div class=\"h alt\">BDD<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 22px;\"><strong>Tests acceptance.<\u002Fstrong><\u002Fp>\n        <p class=\"body\" style=\"font-size: 22px; color: var(--fg2); margin-top: 8px;\">Given / When / Then. The contract with the stakeholder. Lives in the issue.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h alt\">TDD<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 22px;\"><strong>Tests the code.<\u002Fstrong><\u002Fp>\n        <p class=\"body\" style=\"font-size: 22px; color: var(--fg2); margin-top: 8px;\">Red / green / refactor. Unit tests for the agent's tight loop.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h alt\">Playwright<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 22px;\"><strong>Tests the UI.<\u002Fstrong><\u002Fp>\n        <p class=\"body\" style=\"font-size: 22px; color: var(--fg2); margin-top: 8px;\">End-to-end in a real browser. Closes the last feedback gap the agent can't see.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      Make everything testable. <span class=\"accent\">The agent's effectiveness is bounded by your test surface.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 15 BLOCK 2 DIVIDER ============= -->\n<section data-label=\"15 Block 2 divider\" class=\"divider\">\n  <div class=\"blob blob-tr\"><\u002Fdiv>\n  <div class=\"blob blob-bl\"><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"block-num\">Block 2<\u002Fdiv>\n    <h1 class=\"title\">AGENTS.md — the handbook.<\u002Fh1>\n    <p class=\"tagline\">The single most important file in your project.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 16 WITHOUT ONBOARDING ============= -->\n<section data-label=\"16 Without onboarding\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Without onboarding<\u002Fdiv>\n    <h1 class=\"title\">\"Add an endpoint to fetch products by category.\"<\u002Fh1>\n    <hr class=\"title-rule\">\n    <ul class=\"clean crosses\" style=\"margin-top: 16px;\">\n      <li>Guesses file structure<\u002Fli>\n      <li>Invents naming conventions<\u002Fli>\n      <li>Misses your test patterns<\u002Fli>\n      <li>Touches files that should never be touched<\u002Fli>\n      <li>Creates a PR nobody wants to review<\u002Fli>\n      <li>Burns tokens on wrong attempts<\u002Fli>\n    <\u002Ful>\n    <p class=\"body\" style=\"margin-top: 36px; font-size: 36px; color: var(--fg2); font-style: italic;\">She means well. She just doesn't know.<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 17 WITH ONBOARDING ============= -->\n<section data-label=\"17 With onboarding\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">With onboarding · 15 lines of AGENTS.md<\u002Fdiv>\n    <h1 class=\"title\">\"Add an endpoint to fetch products by category.\"<\u002Fh1>\n    <hr class=\"title-rule\">\n    <ul class=\"clean checks\" style=\"margin-top: 16px;\">\n      <li>Reads AGENTS.md → knows where endpoints live<\u002Fli>\n      <li>Follows your naming patterns (.NET conventions)<\u002Fli>\n      <li>Speaks your domain language<\u002Fli>\n      <li>Respects your bounded contexts<\u002Fli>\n      <li>Writes xUnit tests in the right style<\u002Fli>\n      <li>Stops at the boundaries you defined<\u002Fli>\n      <li>Runs <span class=\"kbd\">dotnet test<\u002Fspan> before flagging \"done\"<\u002Fli>\n    <\u002Ful>\n    <div class=\"callout\" style=\"margin-top: 28px;\">\n      Same agent. Same prompt. <span class=\"accent\">Completely different result.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 18 RED HAT — THE DATA ============= -->\n<section data-label=\"18 Red Hat data\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Red Hat · April 2026<\u002Fdiv>\n    <h1 class=\"title\">One markdown file. 4.4× the throughput.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 40px; align-items: center;\">\n      <div>\n        <table class=\"t\">\n          <thead>\n            <tr><th>Metric<\u002Fth><th class=\"num\">Before<\u002Fth><th class=\"num\">After<\u002Fth><\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr><td>Commits/month from agentic flow<\u002Ftd><td class=\"num\">12<\u002Ftd><td class=\"num em\">53<\u002Ftd><\u002Ftr>\n            <tr><td>Improvement<\u002Ftd><td class=\"num muted\">—<\u002Ftd><td class=\"num em\" style=\"font-size: 36px;\">4.4×<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n        <p class=\"small\" style=\"margin-top: 28px;\">developers.redhat.com<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"text-align: center;\">\n        <div class=\"bigstat\">4.4<span class=\"unit\">×<\u002Fspan><\u002Fdiv>\n        <p class=\"body\" style=\"margin-top: 24px; color: var(--fg2);\">more shipped code, from one file you can write in an afternoon.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 19 WHAT IS AGENTS.MD ============= -->\n<section data-label=\"19 What is AGENTS.md\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">≤ 150 lines · 60 seconds to scan<\u002Fdiv>\n    <h1 class=\"title\">What goes in AGENTS.md.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t\">\n      <thead>\n        <tr><th style=\"width: 38%;\">Question<\u002Fth><th>Content<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>What does the project do?<\u002Ftd><td>One sentence.<\u002Ftd><\u002Ftr>\n        <tr><td>How do I start / test / lint?<\u002Ftd><td>Exact commands.<\u002Ftd><\u002Ftr>\n        <tr><td>Where does the code live?<\u002Ftd><td>Folder structure (file:line refs, not snippets).<\u002Ftd><\u002Ftr>\n        <tr><td><strong>How do we work with Git?<\u002Fstrong><\u002Ftd><td><strong>Branching, commit conventions.<\u002Fstrong><\u002Ftd><\u002Ftr>\n        <tr><td>Common mistakes?<\u002Ftd><td>What new devs always get wrong.<\u002Ftd><\u002Ftr>\n        <tr><td>When should I stop?<\u002Ftd><td>Stop rules <span class=\"muted\">(next slide).<\u002Fspan><\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 20 STOP RULES — TWO LAYERS ============= -->\n<section data-label=\"20 Stop rules\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Two layers<\u002Fdiv>\n    <h1 class=\"title\">Soft = guidance. Hard = guardrail.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 16px;\">\n      <div class=\"col-card\">\n        <div class=\"h\">Soft · judgment<\u002Fdiv>\n        <div class=\"v\">AGENTS.md<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px; margin-top: 16px;\">\"Don't touch payments without review.\"<\u002Fp>\n        <p class=\"small\" style=\"margin-top: 14px;\">She respects them — mostly.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\" style=\"background: var(--monterro-navy); color: var(--monterro-offwhite); border-color: var(--monterro-navy);\">\n        <div class=\"h\" style=\"color: var(--monterro-orange);\">Hard · deterministic<\u002Fdiv>\n        <div class=\"v\" style=\"color: var(--monterro-offwhite);\">.claude/settings.json<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px; margin-top: 16px; color: var(--monterro-offwhite);\">She literally cannot run <span class=\"kbd\">dotnet ef database update<\u002Fspan>.<\u002Fp>\n        <p class=\"small\" style=\"margin-top: 14px; color: var(--fg-on-dark-2);\">Zero loopholes.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cols cols-2\" style=\"margin-top: 32px; gap: 56px;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;\">AGENTS.md rules (example)<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 24px;\">\n          <li style=\"font-size: 24px;\">Never modify payments / partner integrations without review<\u002Fli>\n          <li style=\"font-size: 24px;\">DB migrations require review — never auto-apply<\u002Fli>\n          <li style=\"font-size: 24px;\">Live-shift schedule mutations dry-run by default<\u002Fli>\n          <li style=\"font-size: 24px;\">No new NuGet/npm deps without approval<\u002Fli>\n          <li style=\"font-size: 24px;\"><em>If unsure: stop and ask.<\u002Fem><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;\">settings.json deny (example)<\u002Fdiv>\n        <pre class=\"code\" style=\"font-size: 20px;\">Bash(rm -rf *)\nBash(dotnet ef database update *)\nBash(git push --force *)<\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 21 WHAT NOT TO PUT IN ============= -->\n<section data-label=\"21 What not to write\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Don't waste tokens on what she already knows<\u002Fdiv>\n    <h1 class=\"title\">The LLM is the brain.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t\">\n      <thead>\n        <tr><th class=\"orange\">DON'T write<\u002Fth><th class=\"orange\">DO write<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>\"Use camelCase\"<\u002Ftd><td>\"We prefix all API routes with /v2/\"<\u002Ftd><\u002Ftr>\n        <tr><td>\"Write unit tests\"<\u002Ftd><td>\"We run <span class=\"kbd\">dotnet test<\u002Fspan> — minimum 80 % coverage\"<\u002Ftd><\u002Ftr>\n        <tr><td>\"Handle exceptions\"<\u002Ftd><td>\"All exceptions are logged via Serilog\"<\u002Ftd><\u002Ftr>\n        <tr><td>\"Comment your code\"<\u002Ftd><td>\"XML doc comments on public APIs only\"<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      Generic = wasted tokens. <span class=\"accent\">Specific = competitive edge.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 22 TWO LINES (Pocock) ============= -->\n<section data-label=\"22 Two lines\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">If you're not on a spec framework yet — bake it in<\u002Fdiv>\n    <h1 class=\"title\">Two lines that change everything.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <pre class=\"code\" style=\"margin-top: 16px;\">- At the end of each plan, list <span class=\"c-str\">unresolved questions<\u002Fspan> (if any).\n- Be extremely <span class=\"c-str\">concise<\u002Fspan>. Sacrifice grammar for concision.<\u002Fpre>\n    <div class=\"cols cols-2\" style=\"margin-top: 36px;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;\">unresolved questions<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px;\">She <strong>tells you what she doesn't know<\u002Fstrong> instead of guessing. Single most powerful behaviour shift you can make.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;\">be concise<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px;\">Plans become scannable. Less to read, less context burned, easier to spot the wrong thing.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 32px;\">\n      <div><span class=\"accent\">Today<\u002Fspan> → add both lines. <span class=\"accent\">Once <span class=\"kbd\">/grill-me<\u002Fspan> is in your flow<\u002Fspan> → drop them.<\u002Fdiv>\n      <div style=\"margin-top: 12px; font-size: 22px; opacity: 0.85; font-style: italic;\">\"I dropped 'be concise' in preference to a grilling session. When I stopped reading the plans, I stopped needing them to be concise.\" — Matt Pocock<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 24 WHERE IT LIVES ============= -->\n<section data-label=\"24 Where AGENTS lives\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">A team document<\u002Fdiv>\n    <h1 class=\"title\">Checked in. Reviewed. Per-folder. Grows from real mistakes.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px;\">\n      <div>\n        <ul class=\"clean\">\n          <li><strong>Checked into git.<\u002Fstrong> Everyone gets the same onboarding.<\u002Fli>\n          <li><strong>Reviewed every sprint<\u002Fstrong> — like coding standards.<\u002Fli>\n          <li><strong>The 2-mistake rule.<\u002Fstrong> Same mistake twice → new line.<\u002Fli>\n          <li><strong>Per-folder hierarchy.<\u002Fstrong> Nearest file wins (like .gitignore).<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <pre class=\"code\" style=\"font-size: 22px;\">myapp/\n├── <span class=\"c-key\">AGENTS.md<\u002Fspan>            <span class=\"c-com\">← Project-wide<\u002Fspan>\n├── backend/\n│   └── <span class=\"c-key\">AGENTS.md<\u002Fspan>        <span class=\"c-com\">← .NET-specific rules<\u002Fspan>\n├── frontend/\n│   └── <span class=\"c-key\">AGENTS.md<\u002Fspan>        <span class=\"c-com\">← React rules<\u002Fspan>\n└── integrations/\n    └── partner/<span class=\"c-key\">AGENTS.md<\u002Fspan>  <span class=\"c-com\">← Partner only<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      Onboarding documents grow <span class=\"accent\">organically<\u002Fspan> — write rules from real mistakes, not theory.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 25 INDUSTRY STANDARD ============= -->\n<section data-label=\"25 Industry standard\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">AAIF / Linux Foundation · 60 000+ repos<\u002Fdiv>\n    <h1 class=\"title\">One file. All agents.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t\">\n      <thead>\n        <tr><th>Tool<\u002Fth><th style=\"width: 12%;\" class=\"center\">Reads AGENTS.md?<\u002Fth><th>Native file<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td><strong>Claude Code<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">CLAUDE.md<\u002Fspan> → <span class=\"kbd\">ln -s AGENTS.md CLAUDE.md<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>GitHub Copilot<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">.github/copilot-instructions.md<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>OpenAI Codex<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">.codex/instructions.md<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>Cursor<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">.cursorrules<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>Gemini CLI<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">GEMINI.md<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>Windsurf<\u002Fstrong><\u002Ftd><td class=\"center orange\">✓<\u002Ftd><td><span class=\"kbd\">.windsurfrules<\u002Fspan><\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 26 DON'T USE /init ============= -->\n<section data-label=\"26 Dont use init\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">⚠ The convenient button<\u002Fdiv>\n    <h1 class=\"title\">Don't use <span class=\"kbd\" style=\"font-size: 0.85em;\">/init<\u002Fspan>.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t\">\n      <thead>\n        <tr><th class=\"orange\"><span class=\"kbd\">/init<\u002Fspan> · the easy path<\u002Fth><th class=\"orange\">The right prompt<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>200+ lines<\u002Ftd><td>≤ 150 lines<\u002Ftd><\u002Ftr>\n        <tr><td>Generic coding advice (camelCase, error handling)<\u002Ftd><td>Only what's specific to YOUR project<\u002Ftd><\u002Ftr>\n        <tr><td>Pasted code snippets that go stale<\u002Ftd><td><span class=\"kbd\">file:line<\u002Fspan> references that update<\u002Ftd><\u002Ftr>\n        <tr><td>One opaque file dumped on you<\u002Ftd><td>Index → progressive disclosure into <span class=\"kbd\">docs/<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td>Forgets the two mandatory lines<\u002Ftd><td>Always includes them<\u002Ftd><\u002Ftr>\n        <tr><td>Crowds the desk every session<\u002Ftd><td>Leaves room for actual work<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      The shortcut isn't the right tool here. <span class=\"accent\">A shorter, sharper AGENTS.md beats a longer one<\u002Fspan> — every session, every prompt.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 27 DEMO — generate AGENTS.md ============= -->\n<section data-label=\"27 Demo prompt\" class=\"demo\">\n  <div class=\"frame\">\n    <span class=\"label-tag label-handson\">Demo · live<\u002Fspan>\n    <h1 class=\"title\">Generate AGENTS.md — the right prompt.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <pre class=\"code\" style=\"font-size: 24px; margin-top: 8px;\">Analyse this codebase and create an AGENTS.md file:\n1. Keep it under 150 lines\n2. Cover: WHAT (tech stack), WHY (purpose), HOW (commands)\n3. Progressive Disclosure: index pointing to docs/ files\n4. file:line references instead of code snippets\n5. Assume linters handle code style\n6. Always include these two lines:\n   - Be extremely concise. Sacrifice grammar for concision.\n   - At the end of each plan, list unresolved questions (if any).\n\nExtract patterns into docs/architectural_patterns.md.\nFinally: ln -s AGENTS.md CLAUDE.md<\u002Fpre>\n    <p class=\"small\" style=\"margin-top: 30px; color: var(--fg-on-dark-2);\">Copy-paste into Claude Code instead of <span class=\"kbd\">/init<\u002Fspan>.<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8ba37f83-809a-4d28-b561-096279cc4378\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 28 HANDS-ON 1 ============= -->\n<section data-label=\"28 Hands-on 1\" class=\"handson\">\n  <div class=\"frame\">\n    <span class=\"label-tag label-handson\">Hands-on 1 · 15 min<\u002Fspan>\n    <h1 class=\"title\">Generate your AGENTS.md.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-3\" style=\"margin-top: 16px; align-items: stretch;\">\n      <div class=\"col-card\">\n        <div class=\"h\">Step 1<\u002Fdiv>\n        <div class=\"v\">Run the prompt<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">Copy-paste into Claude Code on your repo.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h\">Step 2<\u002Fdiv>\n        <div class=\"v\">Review &amp; sharpen<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">Cut generic filler. Add YOUR stop rules. Add the two mandatory lines. <span class=\"kbd\">ln -s AGENTS.md CLAUDE.md<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h\">Step 3<\u002Fdiv>\n        <div class=\"v\">Test it<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">Give her a small task. Did she follow the rules? Where she didn't = candidate for a new line.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 36px; background: #fff;\">\n      AGENTS.md isn't born finished — it <span class=\"accent\">grows out of mistakes.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 29 BREAK ============= -->\n<section data-label=\"29 Break\" class=\"warm\">\n  <div class=\"frame\" style=\"justify-content: center; align-items: center; text-align: center;\">\n    <div class=\"eyebrow\" style=\"text-align: center;\">10 min<\u002Fdiv>\n    <h1 class=\"title\" style=\"font-size: 160px; font-weight: 300;\">Break.<\u002Fh1>\n    <p class=\"body\" style=\"font-size: 36px; color: var(--fg2);\">We continue right after.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 30 BLOCK 3 DIVIDER ============= -->\n<section data-label=\"30 Block 3 divider\" class=\"divider\">\n  <div class=\"blob blob-tr\"><\u002Fdiv>\n  <div class=\"blob blob-bl\"><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"block-num\">Block 3<\u002Fdiv>\n    <h1 class=\"title\">The toolkit.<\u002Fh1>\n    <p class=\"tagline\">Skills · Commands · Hooks · Subagents.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 31 FOUR LEVERS ============= -->\n<section data-label=\"31 Four levers\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Each lever solves a context problem<\u002Fdiv>\n    <h1 class=\"title\">Five tools. One question.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t\">\n      <thead>\n        <tr><th style=\"width: 22%;\">Lever<\u002Fth><th>What problem it solves<\u002Fth><th style=\"width: 26%;\">Context cost<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td><strong>AGENTS.md<\u002Fstrong><\u002Ftd><td>She needs to know your project always<\u002Ftd><td><span class=\"orange\">●<\u002Fspan> High — loaded every session<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Skills<\u002Fstrong><\u002Ftd><td>She needs to know X <em>sometimes<\u002Fem><\u002Ftd><td><span style=\"color: #64ce91;\">●<\u002Fspan> Low — ~80 tokens of description<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Commands<\u002Fstrong><\u002Ftd><td>You ask for the same thing repeatedly<\u002Ftd><td><span style=\"color: #64ce91;\">●<\u002Fspan> Low — invoked on demand<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Hooks<\u002Fstrong><\u002Ftd><td>A rule must run automatically<\u002Ftd><td><span class=\"muted\">○<\u002Fspan> Zero — runs outside the LLM<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Subagents<\u002Fstrong><\u002Ftd><td>A task is too big for one desk<\u002Ftd><td><span class=\"muted\">○<\u002Fspan> Zero — own desk, returns summary<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 32 SKILL — grill-me ============= -->\n<section data-label=\"32 Skill grill-me\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Example skill · the one we'll use this afternoon<\u002Fdiv>\n    <h1 class=\"title\">A skill in three sentences: <span class=\"kbd\" style=\"font-size: 0.85em;\">grill-me<\u002Fspan>.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <pre class=\"code\" style=\"font-size: 22px;\"><span class=\"c-com\">---<\u002Fspan>\n<span class=\"c-key\">name<\u002Fspan>: grill-me\n<span class=\"c-key\">description<\u002Fspan>: Interview the user about a fuzzy idea, walking\n             the design tree before any plan is drafted.\n<span class=\"c-com\">---<\u002Fspan>\n\nInterview me relentlessly about every aspect of this plan\nuntil we reach a shared understanding.\n\nWalk down each branch of the design tree, resolving dependencies\nbetween decisions one-by-one.\n\nFor each question, provide your recommended answer.\nAsk the questions one at a time.<\u002Fpre>\n    <div class=\"cols cols-3\" style=\"margin-top: 36px; gap: 32px;\">\n      <div class=\"col-card\">\n        <div class=\"h alt\">Always on desk<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">description &nbsp;<span class=\"muted\">~80 tok<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h alt\">On invocation<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">full SKILL.md body<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h alt\">On demand<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 24px;\">linked docs / examples<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"small\" style=\"margin-top: 24px;\">Pipeline this afternoon (mattpocock/skills, MIT): <span class=\"kbd\">grill-me<\u002Fspan> · <span class=\"kbd\">to-prd<\u002Fspan> · <span class=\"kbd\">to-issues<\u002Fspan> · <span class=\"kbd\">tdd<\u002Fspan> · <span class=\"kbd\">zoom-out<\u002Fspan> · <span class=\"kbd\">ubiquitous-language<\u002Fspan> · <span class=\"kbd\">domain-model<\u002Fspan><\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 33 COMMAND — bdd-in-issue ============= -->\n<section data-label=\"33 Command bdd-in-issue\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Example command · /bdd-in-issue<\u002Fdiv>\n    <h1 class=\"title\">Anything you ask for repeatedly → make it a command.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 28px;\">\n      <div>\n        <pre class=\"code light\" style=\"font-size: 22px;\">/bdd-in-issue 1247\n/bdd-in-issue issues/03-ui-modal.md<\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <p class=\"body\" style=\"font-size: 26px;\">Without it: Copilot guesses behaviour, PR comes back half-right.<\u002Fp>\n        <p class=\"body\" style=\"font-size: 26px;\"><strong>With it:<\u002Fstrong> contract is baked in, PR comes back ready to merge.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 34 HOOKS ============= -->\n<section data-label=\"34 Hooks\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Deterministic · zero tokens<\u002Fdiv>\n    <h1 class=\"title\">AGENTS.md tells her. Hooks <span class=\"orange\">enforce.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <pre class=\"code\" style=\"font-size: 20px;\"><span class=\"c-com\">// .claude/settings.json<\u002Fspan>\n{\n  <span class=\"c-key\">\"hooks\"<\u002Fspan>: {\n    <span class=\"c-key\">\"PostToolUse\"<\u002Fspan>: [{\n      <span class=\"c-key\">\"matcher\"<\u002Fspan>: <span class=\"c-str\">\"Write|Edit\"<\u002Fspan>,\n      <span class=\"c-key\">\"hooks\"<\u002Fspan>: [{ <span class=\"c-key\">\"command\"<\u002Fspan>: <span class=\"c-str\">\"dotnet format --include $FILE\"<\u002Fspan> }]\n    }],\n    <span class=\"c-key\">\"Stop\"<\u002Fspan>: [{\n      <span class=\"c-key\">\"hooks\"<\u002Fspan>: [{ <span class=\"c-key\">\"command\"<\u002Fspan>: <span class=\"c-str\">\"dotnet build --warnaserror &amp;&amp; dotnet test\"<\u002Fspan> }]\n    }]\n  }\n}<\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <table class=\"t\" style=\"font-size: 24px;\">\n          <thead><tr><th>Event<\u002Fth><th>Fires when<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td><span class=\"kbd\">SessionStart<\u002Fspan><\u002Ftd><td>New session<\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"kbd\">PreToolUse<\u002Fspan><\u002Ftd><td>Before a tool · can <strong>block<\u002Fstrong><\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"kbd\">PostToolUse<\u002Fspan><\u002Ftd><td>After a tool<\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"kbd\">Stop<\u002Fspan><\u002Ftd><td>She declares done<\u002Ftd><\u002Ftr>\n            <tr><td><span class=\"kbd\">SubagentStop<\u002Fspan><\u002Ftd><td>A subagent finishes<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 28px;\">\n      <em>It works on my machine<\u002Fem> → <span class=\"kbd\">Stop<\u002Fspan> hook runs build + tests automatically.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 35 SUBAGENTS ============= -->\n<section data-label=\"35 Subagents\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Own desk · returns summary<\u002Fdiv>\n    <h1 class=\"title\">Don't put research on the same desk as the work.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px;\">\n      <div>\n        <pre class=\"code\" style=\"font-size: 20px;\"><span class=\"c-com\">---<\u002Fspan>\n<span class=\"c-key\">name<\u002Fspan>: deep-research\n<span class=\"c-key\">description<\u002Fspan>: Investigate a topic, return summary\n<span class=\"c-key\">context<\u002Fspan>: fork           <span class=\"c-com\">← isolated window<\u002Fspan>\n<span class=\"c-key\">agent<\u002Fspan>: Explore          <span class=\"c-com\">← read-only<\u002Fspan>\n<span class=\"c-key\">tools<\u002Fspan>: [\"Read\", \"Grep\", \"Glob\"]\n<span class=\"c-com\">---<\u002Fspan>\n\nInvestigate $ARGUMENTS thoroughly. Return:\n- key findings (3-5 bullets)\n- file:line refs for the most important code\n- unresolved questions<\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <svg viewBox=\"0 0 700 380\" style=\"width: 100%; height: auto;\">\n          <!-- main desk -->\n          <rect x=\"0\" y=\"20\" width=\"320\" height=\"180\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"160\" y=\"50\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#FC6C54\">MAIN AGENT'S DESK<\u002Ftext>\n          <text x=\"160\" y=\"110\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#010031\">5K tokens<\u002Ftext>\n          <text x=\"160\" y=\"150\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" fill=\"#4a4b5c\" font-style=\"italic\">stays clean<\u002Ftext>\n\n          <!-- arrow + summary -->\n          <path d=\"M 320 100 L 380 100\" stroke=\"#80819a\" stroke-width=\"2\" marker-end=\"url(#a1)\"><\u002Fpath>\n          <path d=\"M 380 130 L 320 130\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#a2)\"><\u002Fpath>\n          <text x=\"350\" y=\"80\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"16\" fill=\"#80819a\">task<\u002Ftext>\n          <text x=\"350\" y=\"158\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"16\" font-weight=\"700\" fill=\"#FC6C54\">500-tok summary<\u002Ftext>\n\n          <!-- subagent desk -->\n          <rect x=\"380\" y=\"20\" width=\"320\" height=\"180\" rx=\"14\" fill=\"#FFEC9B\" opacity=\"0.6\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n          <text x=\"540\" y=\"50\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#FC6C54\">SUBAGENT DESK<\u002Ftext>\n          <text x=\"540\" y=\"110\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#010031\">50K tokens<\u002Ftext>\n          <text x=\"540\" y=\"150\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" fill=\"#4a4b5c\" font-style=\"italic\">grep · read · explore<\u002Ftext>\n\n          <defs>\n            <marker id=\"a1\" markerWidth=\"8\" markerHeight=\"8\" refX=\"7\" refY=\"4\" orient=\"auto\">\n              <path d=\"M 0 0 L 8 4 L 0 8 z\" fill=\"#80819a\"><\u002Fpath>\n            <\u002Fmarker>\n            <marker id=\"a2\" markerWidth=\"8\" markerHeight=\"8\" refX=\"7\" refY=\"4\" orient=\"auto\">\n              <path d=\"M 0 0 L 8 4 L 0 8 z\" fill=\"#FC6C54\"><\u002Fpath>\n            <\u002Fmarker>\n          <\u002Fdefs>\n\n          <text x=\"350\" y=\"260\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">When to use<\u002Ftext>\n          <text x=\"350\" y=\"295\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" fill=\"#4a4b5c\">Code review of a large PR<\u002Ftext>\n          <text x=\"350\" y=\"325\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" fill=\"#4a4b5c\">Cross-cutting investigation<\u002Ftext>\n          <text x=\"350\" y=\"355\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" fill=\"#4a4b5c\">Adversarial review<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 36 DECISION MATRIX ============= -->\n<section data-label=\"36 Decision matrix\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Pin this next to your desk<\u002Fdiv>\n    <h1 class=\"title\">Use the lightest lever that solves the problem.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t dense\">\n      <thead>\n        <tr>\n          <th style=\"width: 16%;\">Lever<\u002Fth>\n          <th>Use it when…<\u002Fth>\n          <th>Example<\u002Fth>\n        <\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td><strong>AGENTS.md<\u002Fstrong><\u002Ftd><td>She must know this on <strong>every<\u002Fstrong> task<\u002Ftd><td>\"We use xUnit + FluentAssertions. Never <span class=\"kbd\">.Result<\u002Fspan> on async.\"<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Skill<\u002Fstrong><\u002Ftd><td>She needs this <strong>sometimes<\u002Fstrong>, on relevant tasks<\u002Ftd><td><span class=\"kbd\">/grill-me<\u002Fspan> · <span class=\"kbd\">/review-pr<\u002Fspan> · <span class=\"kbd\">/qa<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>Command<\u002Fstrong><\u002Ftd><td><strong>You<\u002Fstrong> trigger it repeatedly<\u002Ftd><td><span class=\"kbd\">/commit-push-pr<\u002Fspan> · <span class=\"kbd\">/generate-tests<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>Hook<\u002Fstrong><\u002Ftd><td>It must run <strong>automatically<\u002Fstrong>, no judgment<\u002Ftd><td><span class=\"kbd\">dotnet format<\u002Fspan> after Edit · <span class=\"kbd\">dotnet test<\u002Fspan> on Stop<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Subagent<\u002Fstrong><\u002Ftd><td>Too big for one desk · or needs isolation<\u002Ftd><td><span class=\"kbd\">/explore-module<\u002Fspan> across 50 files<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"cols cols-2\" style=\"margin-top: 32px; gap: 56px; align-items: center;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;\">The mental shortcut<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 24px;\">\n          <li style=\"font-size: 24px;\">Always relevant → AGENTS.md<\u002Fli>\n          <li style=\"font-size: 24px;\">Sometimes relevant → Skill<\u002Fli>\n          <li style=\"font-size: 24px;\">I trigger it → Command<\u002Fli>\n          <li style=\"font-size: 24px;\">It triggers itself → Hook<\u002Fli>\n          <li style=\"font-size: 24px;\">It needs its own desk → Subagent<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"callout\">\n        Common mistake: putting a skill's content into AGENTS.md \"to make sure she always knows it.\" That <span class=\"accent\">crowds the desk<\u002Fspan> on every session — even when the skill isn't relevant.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 37 BORIS LOOP ============= -->\n<section data-label=\"37 The loop\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Boris Cherny · creator of Claude Code · ~100 PRs/week<\u002Fdiv>\n    <h1 class=\"title\">Plan · Build · Simplify · Verify.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <svg viewBox=\"0 0 1700 360\" style=\"width: 100%; height: auto;\">\n      <defs>\n        <marker id=\"loopArrow\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"5\" orient=\"auto\">\n          <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#FC6C54\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n      <!-- 4 cards -->\n      <g>\n        <rect x=\"20\" y=\"80\" width=\"380\" height=\"200\" rx=\"14\" fill=\"#fff\" stroke=\"#FC6C54\" stroke-width=\"3\"><\u002Frect>\n        <text x=\"210\" y=\"130\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"34\" font-weight=\"700\" fill=\"#010031\">PLAN<\u002Ftext>\n        <text x=\"210\" y=\"172\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">read-only fresh desk<\u002Ftext>\n        <text x=\"210\" y=\"208\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">Plan Mode · grill-me<\u002Ftext>\n        <text x=\"210\" y=\"252\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-style=\"italic\" fill=\"#FC6C54\">/clear after<\u002Ftext>\n      <\u002Fg>\n      <path d=\"M 400 180 L 440 180\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#loopArrow)\"><\u002Fpath>\n      <g>\n        <rect x=\"450\" y=\"80\" width=\"380\" height=\"200\" rx=\"14\" fill=\"#fff\" stroke=\"#FC6C54\" stroke-width=\"3\"><\u002Frect>\n        <text x=\"640\" y=\"130\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"34\" font-weight=\"700\" fill=\"#010031\">BUILD<\u002Ftext>\n        <text x=\"640\" y=\"172\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">minimum code · one slice<\u002Ftext>\n        <text x=\"640\" y=\"208\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">skills · commands · hooks<\u002Ftext>\n        <text x=\"640\" y=\"252\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-style=\"italic\" fill=\"#FC6C54\">/clear after<\u002Ftext>\n      <\u002Fg>\n      <path d=\"M 830 180 L 870 180\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#loopArrow)\"><\u002Fpath>\n      <g>\n        <rect x=\"880\" y=\"80\" width=\"380\" height=\"200\" rx=\"14\" fill=\"#FFEC9B\" stroke=\"#FC6C54\" stroke-width=\"3\"><\u002Frect>\n        <text x=\"1070\" y=\"130\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"34\" font-weight=\"700\" fill=\"#010031\">SIMPLIFY<\u002Ftext>\n        <text x=\"1070\" y=\"172\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">\"can you remove anything?\"<\u002Ftext>\n        <text x=\"1070\" y=\"208\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">often -20 to -40 % diff<\u002Ftext>\n        <text x=\"1070\" y=\"252\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#FC6C54\">most underrated phase<\u002Ftext>\n      <\u002Fg>\n      <path d=\"M 1260 180 L 1300 180\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#loopArrow)\"><\u002Fpath>\n      <g>\n        <rect x=\"1310\" y=\"80\" width=\"380\" height=\"200\" rx=\"14\" fill=\"#fff\" stroke=\"#FC6C54\" stroke-width=\"3\"><\u002Frect>\n        <text x=\"1500\" y=\"130\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"34\" font-weight=\"700\" fill=\"#010031\">VERIFY<\u002Ftext>\n        <text x=\"1500\" y=\"172\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">tests · lint · QA<\u002Ftext>\n        <text x=\"1500\" y=\"208\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">human reviews intent<\u002Ftext>\n        <text x=\"1500\" y=\"252\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-style=\"italic\" fill=\"#FC6C54\">Stop hook · subagent<\u002Ftext>\n      <\u002Fg>\n      <!-- loop arrow -->\n      <path d=\"M 1500 280 L 1500 320 L 210 320 L 210 280\" stroke=\"#FC6C54\" stroke-width=\"3\" fill=\"none\" stroke-dasharray=\"6 4\" marker-end=\"url(#loopArrow)\"><\u002Fpath>\n      <text x=\"855\" y=\"345\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">next slice<\u002Ftext>\n    <\u002Fsvg>\n    <div class=\"callout\" style=\"margin-top: 16px;\">\n      Each phase = <span class=\"accent\">fresh desk.<\u002Fspan> The afternoon's full pipeline runs this loop once per slice.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 38 BLOCK 4 DIVIDER ============= -->\n<section data-label=\"38 Block 4 divider\" class=\"divider\">\n  <div class=\"blob blob-tr\"><\u002Fdiv>\n  <div class=\"blob blob-bl\"><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"block-num\">Block 4<\u002Fdiv>\n    <h1 class=\"title\">Where does all this stuff live?<\u002Fh1>\n    <p class=\"tagline\">Storage · spec rot · the close-the-ticket rule.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 39 STORAGE ============= -->\n<section data-label=\"39 Storage\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Where specs live<\u002Fdiv>\n    <h1 class=\"title\">Prefer the issue tracker. <span class=\"orange\">If it's in the repo, delete it on close.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <pre class=\"code\" style=\"font-size: 22px;\">project/\n├── <span class=\"c-key\">AGENTS.md<\u002Fspan>\n│\n├── <span class=\"c-key\">specs/<\u002Fspan>            <span class=\"c-com\">← only while issue is OPEN<\u002Fspan>\n│   └── &lt;feature&gt;/\n│       ├── spec.md  plan.md  tasks/\n│       └── <span class=\"c-com\"># delete folder when issue closes<\u002Fspan>\n│\n├── <span class=\"c-key\">docs/<\u002Fspan>            <span class=\"c-com\">← survives close<\u002Fspan>\n│   ├── adr/NNNN-&lt;title&gt;.md\n│   └── bdd/&lt;feature&gt;.feature\n│\n└── src/...\n\n<span class=\"c-com\"># Source of truth: GitHub / Jira issue\n# Repo just mirrors the active slice.<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 30px; color: var(--monterro-navy); margin-bottom: 18px;\">The rule<\u002Fh3>\n        <ul class=\"clean\">\n          <li><strong>Issue tracker is home<\u002Fstrong> — specs live with the ticket and follow its lifecycle<\u002Fli>\n          <li><strong>Repo copy is temporary<\u002Fstrong> — only while the issue is open and the agent needs it in context<\u002Fli>\n          <li><strong>On close: delete<\u002Fstrong> — stale specs in the repo will get picked up by future agents as if they were current<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 32px;\">\n          One source of truth: the issue. <span class=\"accent\">Mirror to the repo only while it's open.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 40 SPEC ROT ============= -->\n<section data-label=\"40 Spec rot\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Spec rot · the simple defence<\u002Fdiv>\n    <h1 class=\"title\">Don't maintain specs. Ship them, close them.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"pullquote\" style=\"margin-top: 16px; font-size: 50px;\">\n      Tie the spec to a ticket. Close the ticket when it ships.\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 1700 220\" style=\"width: 100%; height: auto; margin-top: 36px;\">\n      <defs>\n        <marker id=\"srA\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"5\" orient=\"auto\">\n          <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#FC6C54\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n      <rect x=\"20\" y=\"40\" width=\"380\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n      <text x=\"210\" y=\"90\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#010031\">PRD in ticket<\u002Ftext>\n      <path d=\"M 400 100 L 460 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#srA)\"><\u002Fpath>\n      <rect x=\"470\" y=\"40\" width=\"380\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n      <text x=\"660\" y=\"90\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#010031\">PR merges<\u002Ftext>\n      <path d=\"M 850 100 L 910 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#srA)\"><\u002Fpath>\n      <rect x=\"920\" y=\"40\" width=\"380\" height=\"120\" rx=\"14\" fill=\"#FC6C54\"><\u002Frect>\n      <text x=\"1110\" y=\"90\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#fff\">CLOSE the ticket<\u002Ftext>\n      <text x=\"1110\" y=\"130\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\" fill=\"#fff\">spec frozen at delivery<\u002Ftext>\n      <text x=\"1500\" y=\"80\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">Future change?<\u002Ftext>\n      <text x=\"1500\" y=\"115\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" fill=\"#4a4b5c\">→ NEW ticket.<\u002Ftext>\n    <\u002Fsvg>\n    <ul class=\"clean\" style=\"margin-top: 28px;\">\n      <li>Specs become <strong>disposable<\u002Fstrong>, not living documents<\u002Fli>\n      <li>Closed tickets are a perfect record of what the system was at that moment<\u002Fli>\n      <li>The \"living spec\" anti-pattern is sidestepped entirely<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 41 CLOSING DIVIDER ============= -->\n<section data-label=\"41 Closing divider\" class=\"divider\">\n  <div class=\"blob blob-tr\"><\u002Fdiv>\n  <div class=\"blob blob-bl\"><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"block-num\">Closing the morning<\u002Fdiv>\n    <h1 class=\"title\">Five takeaways. Three next steps.<\u002Fh1>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 42 FIVE TAKEAWAYS ============= -->\n<section data-label=\"42 Five takeaways\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">In priority order<\u002Fdiv>\n    <h1 class=\"title\">What the morning gave you.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <ol style=\"counter-reset: take; list-style: none; padding: 0; margin: 0;\">\n      <li style=\"padding-left: 90px; position: relative; margin-bottom: 36px; font-size: 30px; line-height: 1.4; min-height: 60px;\">\n        <span style=\"position: absolute; left: 0; top: 0; font-size: 50px; font-weight: 300; color: var(--monterro-orange); font-family: Arial; line-height: 1;\">1<\u002Fspan>\n        <strong>Context is the bottleneck.<\u002Fstrong> Tokens = memory. Watch the status bar.\n      <\u002Fli>\n      <li style=\"padding-left: 90px; position: relative; margin-bottom: 36px; font-size: 30px; line-height: 1.4; min-height: 60px;\">\n        <span style=\"position: absolute; left: 0; top: 0; font-size: 50px; font-weight: 300; color: var(--monterro-orange); font-family: Arial; line-height: 1;\">2<\u002Fspan>\n        <strong>AGENTS.md ≤ 150 lines.<\u002Fstrong> Symlink for every tool. Always include the two mandatory lines. <em>(Don't use <span class=\"kbd\">/init<\u002Fspan>.)<\u002Fem>\n      <\u002Fli>\n      <li style=\"padding-left: 90px; position: relative; margin-bottom: 36px; font-size: 30px; line-height: 1.4; min-height: 60px;\">\n        <span style=\"position: absolute; left: 0; top: 0; font-size: 50px; font-weight: 300; color: var(--monterro-orange); font-family: Arial; line-height: 1;\">3<\u002Fspan>\n        <strong>Stop rules — two layers.<\u002Fstrong> AGENTS.md (soft) + settings.json (hard). Both checked into git.\n      <\u002Fli>\n      <li style=\"padding-left: 90px; position: relative; margin-bottom: 36px; font-size: 30px; line-height: 1.4; min-height: 60px;\">\n        <span style=\"position: absolute; left: 0; top: 0; font-size: 50px; font-weight: 300; color: var(--monterro-orange); font-family: Arial; line-height: 1;\">4<\u002Fspan>\n        <strong>Use the lightest lever.<\u002Fstrong> AGENTS.md / Skill / Command / Hook / Subagent — match it to the problem.\n      <\u002Fli>\n      <li style=\"padding-left: 90px; position: relative; margin-bottom: 24px; font-size: 30px; line-height: 1.4; min-height: 60px;\">\n        <span style=\"position: absolute; left: 0; top: 0; font-size: 50px; font-weight: 300; color: var(--monterro-orange); font-family: Arial; line-height: 1;\">5<\u002Fspan>\n        <strong>The 2-mistake rule.<\u002Fstrong> Same mistake twice → new line in AGENTS.md (or a hook, or a skill).\n      <\u002Fli>\n    <\u002Fol>\n    <div class=\"callout\" style=\"margin-top: 24px;\">\n      If you only do <span class=\"accent\">(1)<\u002Fspan> and <span class=\"accent\">(2)<\u002Fspan> — you've already captured most of the lift.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 43 THREE NEXT STEPS ============= -->\n<section data-label=\"43 Three next steps\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Before Monday<\u002Fdiv>\n    <h1 class=\"title\">Three concrete next steps.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-3\" style=\"margin-top: 16px; align-items: stretch;\">\n      <div class=\"col-card\">\n        <div class=\"h\">Tonight · 30 min<\u002Fdiv>\n        <div class=\"v\">Finish your <span class=\"kbd\" style=\"font-size: 22px;\">AGENTS.md<\u002Fspan> — add 3–5 rules from today's mistakes.<\u002Fdiv>\n        <p class=\"small\" style=\"margin-top: 12px;\"><em>e.g. \"Use xUnit + FluentAssertions\" · \"Run <span class=\"kbd\" style=\"font-size: 16px;\">dotnet test<\u002Fspan> before commit\" · \"Never <span class=\"kbd\" style=\"font-size: 16px;\">.Result<\u002Fspan> on async\"<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h\">This week<\u002Fdiv>\n        <div class=\"v\">Add one <span class=\"kbd\" style=\"font-size: 22px;\">Stop<\u002Fspan> hook that runs build + tests after every agent edit.<\u002Fdiv>\n        <p class=\"small\" style=\"margin-top: 12px;\"><em>e.g. <span class=\"kbd\" style=\"font-size: 16px;\">.claude/settings.json<\u002Fspan> → <span class=\"kbd\" style=\"font-size: 16px;\">dotnet build &amp;&amp; dotnet test<\u002Fspan><\u002Fem><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h\">This quarter<\u002Fdiv>\n        <div class=\"v\">Agree on a Jira ticket template — what every ticket must contain before an agent picks it up.<\u002Fdiv>\n        <p class=\"small\" style=\"margin-top: 12px;\"><em>e.g. context · acceptance criteria · BDD scenarios · affected modules<\u002Fem><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      <span class=\"accent\">Two minutes — translate the three to your codebase.<\u002Fspan> Write them down. Say them out loud to a neighbour.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44 LUNCH BRIDGE ============= -->\n<section data-label=\"44 Lunch\" class=\"warm\">\n  <div class=\"frame\" style=\"justify-content: center; align-items: center; text-align: center;\">\n    <div class=\"eyebrow\" style=\"text-align: center;\">Lunch<\u002Fdiv>\n    <h1 class=\"title\" style=\"font-size: 140px; font-weight: 300;\">Bring a real backlog ticket.<\u002Fh1>\n    <p class=\"body\" style=\"font-size: 36px; color: var(--fg2); max-width: 1200px; margin: 0 auto;\">We'll run the loop end-to-end on a sample repo, then you do the same on your ticket.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 44b POCOCK FLOW — overview ============= -->\n<section data-label=\"45 Pocock flow overview\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">After lunch · the loop we'll run end-to-end<\u002Fdiv>\n    <h1 class=\"title\">From fuzzy idea to shipped slice — <span class=\"orange\">five steps.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <svg viewBox=\"0 0 1700 220\" style=\"width: 100%; height: auto; margin-top: 36px;\">\n      <defs>\n        <marker id=\"pfA\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"5\" orient=\"auto\">\n          <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#FC6C54\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n      <g font-family=\"Arial\">\n        <rect x=\"10\" y=\"40\" width=\"300\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"160\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">1 · grill-me<\u002Ftext>\n        <text x=\"160\" y=\"115\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">reach shared<\u002Ftext>\n        <text x=\"160\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">understanding<\u002Ftext>\n\n        <path d=\"M 310 100 L 350 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#pfA)\"><\u002Fpath>\n\n        <rect x=\"350\" y=\"40\" width=\"300\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"500\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">2 · to-prd<\u002Ftext>\n        <text x=\"500\" y=\"115\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">destination<\u002Ftext>\n        <text x=\"500\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">document<\u002Ftext>\n\n        <path d=\"M 650 100 L 690 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#pfA)\"><\u002Fpath>\n\n        <rect x=\"690\" y=\"40\" width=\"320\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"850\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">3 · to-issues<\u002Ftext>\n        <text x=\"850\" y=\"115\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">vertical slices,<\u002Ftext>\n        <text x=\"850\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">independently grabbable<\u002Ftext>\n\n        <path d=\"M 1010 100 L 1050 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#pfA)\"><\u002Fpath>\n\n        <rect x=\"1050\" y=\"40\" width=\"300\" height=\"120\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"1200\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">4 · implement<\u002Ftext>\n        <text x=\"1200\" y=\"115\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">AFK · agent picks<\u002Ftext>\n        <text x=\"1200\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" fill=\"#010031\">one issue at a time<\u002Ftext>\n\n        <path d=\"M 1350 100 L 1390 100\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#pfA)\"><\u002Fpath>\n\n        <rect x=\"1390\" y=\"40\" width=\"300\" height=\"120\" rx=\"14\" fill=\"#FC6C54\"><\u002Frect>\n        <text x=\"1540\" y=\"80\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#fff\">5 · review &amp; close<\u002Ftext>\n        <text x=\"1540\" y=\"115\" text-anchor=\"middle\" font-size=\"20\" fill=\"#fff\">human in the loop<\u002Ftext>\n        <text x=\"1540\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" fill=\"#fff\">spec frozen at delivery<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n    <div class=\"cols cols-2\" style=\"margin-top: 40px; gap: 56px;\">\n      <div>\n        <h3 style=\"font-size: 28px; color: var(--monterro-navy); margin-bottom: 14px;\">Human in the loop<\u002Fh3>\n        <p class=\"body\" style=\"font-size: 24px;\">Steps 1–3 and 5. Decisions, alignment, review — never delegate these.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 28px; color: var(--monterro-navy); margin-bottom: 14px;\">AFK<\u002Fh3>\n        <p class=\"body\" style=\"font-size: 24px;\">Step 4. Once the issue is well-shaped, the agent runs while you do other work.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44c STEP 1 — grill-me ============= -->\n<section data-label=\"46 Step 1 grill-me\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 1 · grill-me<\u002Fdiv>\n    <h1 class=\"title\">Don't ask for a plan. <span class=\"orange\">Reach a shared design concept.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <pre class=\"code light\" style=\"font-size: 24px;\">/grill-me clientbrief.md<\u002Fpre>\n        <p class=\"body\" style=\"font-size: 24px; margin-top: 20px;\">The agent walks the design tree, asks <strong>one question at a time<\u002Fstrong>, gives its recommended answer, and refuses to draft anything until you're aligned.<\u002Fp>\n        <p class=\"body\" style=\"font-size: 24px; margin-top: 16px;\">Sessions can run 20–80 questions. That's the point — every answer is a decision the agent would otherwise hallucinate.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">What you're producing<\u002Fh3>\n        <ul class=\"clean\">\n          <li>A <strong>conversation history<\u002Fstrong>, not a spec<\u002Fli>\n          <li>The <em>design concept<\u002Fem> — Brooks's term for the shared idea everyone on the build is operating from<\u002Fli>\n          <li>~25k tokens of gold you'll summarise next<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 28px;\">\n          Do this with humans in the room. Domain expert + dev + agent. Mob-prompt the hard decisions.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44d STEP 2 — to-prd ============= -->\n<section data-label=\"47 Step 2 to-prd\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 2 · to-prd<\u002Fdiv>\n    <h1 class=\"title\">Summarise the grilling into a <span class=\"orange\">destination document.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <pre class=\"code light\" style=\"font-size: 24px;\">/to-prd<\u002Fpre>\n        <pre class=\"code\" style=\"font-size: 20px; margin-top: 18px;\"><span class=\"c-com\"># PRD · gamification<\u002Fspan>\n\n<span class=\"c-key\">## Problem<\u002Fspan>\nStudents drop off after a few lessons.\n\n<span class=\"c-key\">## Solution<\u002Fspan>\nPoints + streaks visible on dashboard.\n\n<span class=\"c-key\">## User stories<\u002Fspan>\n- As a student, when I complete a lesson…\n- As a student, when I break a streak…\n  <span class=\"c-com\">(18 stories)<\u002Fspan>\n\n<span class=\"c-key\">## Implementation decisions<\u002Fspan>\n<span class=\"c-key\">## Testing decisions<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Why you don't need to read it<\u002Fh3>\n        <ul class=\"clean\">\n          <li>You already share the design concept — the grilling did that<\u002Fli>\n          <li>The PRD is the agent <em>summarising<\u002Fem>, and LLMs are excellent at summarisation<\u002Fli>\n          <li>You'll catch any drift at issue-creation time, where it's still cheap<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 28px;\">\n          The PRD lives in the <strong>issue<\u002Fstrong>. Repo mirror is optional and temporary.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44e STEP 3 — to-issues / vertical slices ============= -->\n<section data-label=\"48 Step 3 to-issues\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 3 · to-issues · the most important step<\u002Fdiv>\n    <h1 class=\"title\">Cut <span class=\"orange\">vertically.<\u002Fspan> Not by layer.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Horizontal (what AI defaults to)<\u002Fh3>\n        <svg viewBox=\"0 0 600 240\" style=\"width: 100%; height: auto;\">\n          <g font-family=\"Arial\" font-size=\"18\">\n            <rect x=\"10\" y=\"10\" width=\"580\" height=\"60\" fill=\"#fde6df\" stroke=\"#FC6C54\"><\u002Frect>\n            <text x=\"300\" y=\"46\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">1 · all DB / schema<\u002Ftext>\n            <rect x=\"10\" y=\"80\" width=\"580\" height=\"60\" fill=\"#fde6df\" stroke=\"#FC6C54\"><\u002Frect>\n            <text x=\"300\" y=\"116\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">2 · all API endpoints<\u002Ftext>\n            <rect x=\"10\" y=\"150\" width=\"580\" height=\"60\" fill=\"#fde6df\" stroke=\"#FC6C54\"><\u002Frect>\n            <text x=\"300\" y=\"186\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">3 · all UI<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n        <p class=\"body\" style=\"font-size: 22px; margin-top: 16px; color: var(--fg2);\">No feedback until phase 3. Agent codes blind for hours.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Vertical (tracer bullets)<\u002Fh3>\n        <svg viewBox=\"0 0 600 240\" style=\"width: 100%; height: auto;\">\n          <g font-family=\"Arial\" font-size=\"16\">\n            <rect x=\"10\" y=\"10\" width=\"180\" height=\"200\" fill=\"#e8f0e8\" stroke=\"#5a7a5a\"><\u002Frect>\n            <text x=\"100\" y=\"36\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">slice 1<\u002Ftext>\n            <text x=\"100\" y=\"80\" text-anchor=\"middle\" fill=\"#010031\">schema bit<\u002Ftext>\n            <text x=\"100\" y=\"120\" text-anchor=\"middle\" fill=\"#010031\">+ service<\u002Ftext>\n            <text x=\"100\" y=\"160\" text-anchor=\"middle\" fill=\"#010031\">+ minimal UI<\u002Ftext>\n            <text x=\"100\" y=\"200\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#FC6C54\">visible end-to-end<\u002Ftext>\n\n            <rect x=\"210\" y=\"10\" width=\"180\" height=\"200\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n            <text x=\"300\" y=\"36\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">slice 2<\u002Ftext>\n            <text x=\"300\" y=\"115\" text-anchor=\"middle\" fill=\"#4a4b5c\">streak tracking<\u002Ftext>\n\n            <rect x=\"410\" y=\"10\" width=\"180\" height=\"200\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n            <text x=\"500\" y=\"36\" text-anchor=\"middle\" font-weight=\"700\" fill=\"#010031\">slice 3<\u002Ftext>\n            <text x=\"500\" y=\"115\" text-anchor=\"middle\" fill=\"#4a4b5c\">backfill<\u002Ftext>\n          <\u002Fg>\n        <\u002Fsvg>\n        <p class=\"body\" style=\"font-size: 22px; margin-top: 16px; color: var(--fg2);\">Each slice ships something visible. Feedback every slice.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 28px;\">\n      Hunt &amp; Thomas, <em>Pragmatic Programmer<\u002Fem> — <span class=\"accent\">tracer bullets.<\u002Fspan> 25 years old, still right.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44f STEP 3b — independently grabbable ============= -->\n<section data-label=\"49 Step 3 grabbable\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 3 · output<\u002Fdiv>\n    <h1 class=\"title\">A canban of <span class=\"orange\">independently grabbable<\u002Fspan> issues.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <svg viewBox=\"0 0 1700 380\" style=\"width: 100%; height: auto; margin-top: 24px;\">\n      <defs>\n        <marker id=\"igA\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"5\" orient=\"auto\">\n          <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#010031\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n      <g font-family=\"Arial\">\n        <rect x=\"20\" y=\"130\" width=\"280\" height=\"110\" rx=\"14\" fill=\"#fff\" stroke=\"#FC6C54\" stroke-width=\"3\"><\u002Frect>\n        <text x=\"160\" y=\"170\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">#1 schema +<\u002Ftext>\n        <text x=\"160\" y=\"200\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">points slice<\u002Ftext>\n        <text x=\"160\" y=\"225\" text-anchor=\"middle\" font-size=\"16\" fill=\"#FC6C54\">blocks: —<\u002Ftext>\n\n        <path d=\"M 300 185 L 380 80\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n        <path d=\"M 300 185 L 380 185\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n        <path d=\"M 300 185 L 380 290\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n\n        <rect x=\"380\" y=\"20\" width=\"280\" height=\"110\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"520\" y=\"60\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">#2 streaks<\u002Ftext>\n        <text x=\"520\" y=\"115\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\">blocks: #1<\u002Ftext>\n\n        <rect x=\"380\" y=\"130\" width=\"280\" height=\"110\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"520\" y=\"170\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">#3 wire to<\u002Ftext>\n        <text x=\"520\" y=\"200\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">quiz events<\u002Ftext>\n        <text x=\"520\" y=\"225\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\">blocks: #1, #2<\u002Ftext>\n\n        <rect x=\"380\" y=\"250\" width=\"280\" height=\"110\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"520\" y=\"290\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">#4 retroactive<\u002Ftext>\n        <text x=\"520\" y=\"320\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">backfill<\u002Ftext>\n        <text x=\"520\" y=\"345\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\">blocks: #1<\u002Ftext>\n\n        <path d=\"M 660 80 L 740 185\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n        <path d=\"M 660 185 L 740 185\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n        <path d=\"M 660 290 L 740 185\" stroke=\"#010031\" stroke-width=\"2\" marker-end=\"url(#igA)\"><\u002Fpath>\n\n        <rect x=\"740\" y=\"130\" width=\"280\" height=\"110\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"880\" y=\"170\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">#5 polish +<\u002Ftext>\n        <text x=\"880\" y=\"200\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">levels<\u002Ftext>\n        <text x=\"880\" y=\"225\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\">blocks: all<\u002Ftext>\n\n        <rect x=\"1100\" y=\"40\" width=\"560\" height=\"300\" rx=\"14\" fill=\"#fde6df\" stroke=\"#FC6C54\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"1380\" y=\"90\" text-anchor=\"middle\" font-size=\"26\" font-weight=\"700\" fill=\"#010031\">Once #1 is shipped:<\u002Ftext>\n        <text x=\"1380\" y=\"140\" text-anchor=\"middle\" font-size=\"22\" fill=\"#010031\">#2 and #4 can run in parallel<\u002Ftext>\n        <text x=\"1380\" y=\"175\" text-anchor=\"middle\" font-size=\"22\" fill=\"#010031\">on separate agents.<\u002Ftext>\n        <text x=\"1380\" y=\"240\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">DAG, not list.<\u002Ftext>\n        <text x=\"1380\" y=\"285\" text-anchor=\"middle\" font-size=\"20\" fill=\"#4a4b5c\">Each issue carries enough context to<\u002Ftext>\n        <text x=\"1380\" y=\"312\" text-anchor=\"middle\" font-size=\"20\" fill=\"#4a4b5c\">be picked up cold by a fresh agent.<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44g STEP 4 — implement (AFK) ============= -->\n<section data-label=\"50 Jira to GitHub\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Bridging Pocock's loop to your stack<\u002Fdiv>\n    <h1 class=\"title\">In practice: <span class=\"orange\">idea → issue → Copilot agent → PR.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <svg viewBox=\"0 0 1700 280\" style=\"width: 100%; height: auto; margin-top: 24px;\">\n      <defs>\n        <marker id=\"jgA\" markerWidth=\"10\" markerHeight=\"10\" refX=\"8\" refY=\"5\" orient=\"auto\">\n          <path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#FC6C54\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n      <g font-family=\"Arial\">\n        <rect x=\"20\" y=\"60\" width=\"320\" height=\"160\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"180\" y=\"100\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">FUZZY IDEA<\u002Ftext>\n        <text x=\"180\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">\"add settle-tab v2\"<\u002Ftext>\n        <text x=\"180\" y=\"172\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">half-formed<\u002Ftext>\n        <text x=\"180\" y=\"195\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">in your head<\u002Ftext>\n\n        <path d=\"M 340 140 L 410 140\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#jgA)\"><\u002Fpath>\n        <text x=\"375\" y=\"125\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\" font-style=\"italic\">/grill-me<\u002Ftext>\n\n        <rect x=\"410\" y=\"60\" width=\"320\" height=\"160\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"570\" y=\"100\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">PRD<\u002Ftext>\n        <text x=\"570\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">/to-prd<\u002Ftext>\n        <text x=\"570\" y=\"172\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">decisions captured<\u002Ftext>\n        <text x=\"570\" y=\"195\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">+ BDD scenarios<\u002Ftext>\n\n        <path d=\"M 730 140 L 800 140\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#jgA)\"><\u002Fpath>\n        <text x=\"765\" y=\"125\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\" font-style=\"italic\">/to-issues<\u002Ftext>\n\n        <rect x=\"800\" y=\"60\" width=\"320\" height=\"160\" rx=\"14\" fill=\"#fff\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n        <text x=\"960\" y=\"100\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">ISSUE<\u002Ftext>\n        <text x=\"960\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">Jira <\u002Ftext><\u002Fg><\u002Fsvg><em>or<\u002Fem> GitHub\n        <text x=\"960\" y=\"172\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">vertical slice<\u002Ftext>\n        <text x=\"960\" y=\"195\" text-anchor=\"middle\" font-size=\"18\" fill=\"#4a4b5c\">label: agent-ready<\u002Ftext>\n\n        <path d=\"M 1120 140 L 1190 140\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#jgA)\">\n        <text x=\"1155\" y=\"125\" text-anchor=\"middle\" font-size=\"16\" fill=\"#4a4b5c\" font-style=\"italic\">@assign<\u002Ftext>\n\n        <rect x=\"1190\" y=\"60\" width=\"220\" height=\"160\" rx=\"14\" fill=\"#fde6df\" stroke=\"#FC6C54\" stroke-width=\"2\">\n        <text x=\"1300\" y=\"100\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">COPILOT<\u002Ftext>\n        <text x=\"1300\" y=\"138\" text-anchor=\"middle\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">AFK<\u002Ftext>\n        <text x=\"1300\" y=\"172\" text-anchor=\"middle\" font-size=\"18\" fill=\"#010031\">reads AGENTS.md<\u002Ftext>\n        <text x=\"1300\" y=\"195\" text-anchor=\"middle\" font-size=\"18\" fill=\"#010031\">runs the slice<\u002Ftext>\n\n        <path d=\"M 1410 140 L 1480 140\" stroke=\"#FC6C54\" stroke-width=\"3\" marker-end=\"url(#jgA)\">\n\n        <rect x=\"1480\" y=\"60\" width=\"200\" height=\"160\" rx=\"14\" fill=\"#010031\">\n        <text x=\"1580\" y=\"100\" text-anchor=\"middle\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">PR<\u002Ftext>\n        <text x=\"1580\" y=\"138\" text-anchor=\"middle\" font-size=\"18\" fill=\"#fff\">build green<\u002Ftext>\n        <text x=\"1580\" y=\"162\" text-anchor=\"middle\" font-size=\"18\" fill=\"#fff\">tests pass<\u002Ftext>\n        <text x=\"1580\" y=\"195\" text-anchor=\"middle\" font-size=\"16\" fill=\"#fde6df\" font-style=\"italic\">human reviews<\u002Ftext>\n      \n
