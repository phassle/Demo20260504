  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<title>Agentic Development Workshop<\u002Ftitle>\n<style>/* Monterro Design System — Colors & Type */\n\n/* Fonts: Brand uses Arial as the official typeface, system-installed everywhere. */\n\n:root {\n  /* === PRIMARY COLORS (priority) === */\n  --monterro-orange: #FC6C54;     /* Primary Orange — accent, highlights, lines */\n  --monterro-yellow: #FFEC9B;     /* Primary Yellow — gradient pair, highlights */\n  --monterro-navy: #010031;       /* Primary Navy — covers, dividers, dark surfaces */\n  --monterro-offwhite: #FAFAF4;   /* Primary Off White — page background */\n\n  /* === SECONDARY COLORS === */\n  --monterro-sand: #FFDFD1;       /* Secondary Sand — warm pale */\n  --monterro-aqua: #6470F6;       /* Secondary Aqua — cool accent (blue-violet) */\n  --monterro-teal: #8FECEB;       /* Secondary Teal — cool accent */\n  --monterro-black: #0C0D0E;      /* Text Off Black */\n\n  /* === ORANGE SCALE (light → dark, doc lists ascending light) === */\n  --orange-100: #fedbd5;\n  --orange-200: #feb7ab;\n  --orange-300: #ff927e;\n  --orange-400: #fe7c62;\n  --orange-500: #ff6c52;\n\n  /* === YELLOW SCALE === */\n  --yellow-100: #fffae5;\n  --yellow-200: #fef6cc;\n  --yellow-300: #fff0b2;\n  --yellow-400: #feeea1;\n  --yellow-500: #ffed98;\n\n  /* === NAVY SCALE === */\n  --navy-100: #ffdfd1;   /* note: doc lists this in navy scale (paired tint) */\n  --navy-200: #c1c0cc;\n  --navy-300: #80819a;\n  --navy-400: #3f3c66;\n  --navy-500: #131144;\n\n  /* === STATUS / TRAFFIC LIGHTS === */\n  --status-green:       #64ce91;\n  --status-light-green: #bce191;\n  --status-yellow:      #fdfd61;\n  --status-orange:      #fdd761;\n  --status-red:         #fd6461;\n\n  /* === SEMANTIC FOREGROUND / BACKGROUND === */\n  --bg:           var(--monterro-offwhite);\n  --bg-dark:      var(--monterro-navy);\n  --bg-warm:      var(--monterro-sand);\n  --surface:      #ffffff;\n  --surface-dark: #0a0945;\n\n  --fg1:          var(--monterro-black);  /* primary text on light */\n  --fg2:          #4a4b5c;                 /* secondary text on light */\n  --fg3:          #80819a;                 /* tertiary / meta */\n  --fg-on-dark-1: var(--monterro-offwhite);\n  --fg-on-dark-2: #c1c0cc;\n\n  --accent:       var(--monterro-orange);\n  --accent-soft:  var(--monterro-sand);\n  --link:         var(--monterro-aqua);\n\n  --border:       #e6e3da;\n  --border-dark:  #2a2856;\n  --divider:      var(--monterro-orange); /* horizontal accent line under titles */\n\n  /* === RADII === */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 14px;\n  --radius-lg: 24px;\n  --radius-xl: 40px;\n  --radius-pill: 999px;\n\n  /* === SHADOWS — soft, sparse, brand stays clean === */\n  --shadow-sm: 0 1px 2px rgba(1, 0, 49, 0.06);\n  --shadow-md: 0 6px 18px rgba(1, 0, 49, 0.08);\n  --shadow-lg: 0 24px 60px -12px rgba(1, 0, 49, 0.18);\n\n  /* === SPACING (4-pt grid) === */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* === TYPOGRAPHY === */\n  --font-display: Arial, 'Helvetica Neue', Helvetica, sans-serif;\n  --font-body:    Arial, 'Helvetica Neue', Helvetica, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* === MOTION ===\n     Monterro motion is calm: slow fades, gentle slides, no bounce.\n     Use --ease-out-quart by default; --ease-in-out-quart for two-way transitions. */\n  --dur-fast:   180ms;\n  --dur-base:   320ms;\n  --dur-slow:   540ms;\n  --dur-xslow:  900ms;\n  --ease-out-quart:    cubic-bezier(0.22, 1, 0.36, 1);\n  --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);\n  --ease-standard:     cubic-bezier(0.4, 0, 0.2, 1);\n\n  /* Type scale */\n  --display-1: 96px;\n  --display-2: 72px;\n  --h1: 56px;\n  --h2: 44px;\n  --h3: 32px;\n  --h4: 24px;\n  --h5: 20px;\n  --body-lg: 18px;\n  --body:    16px;\n  --body-sm: 14px;\n  --caption: 12px;\n\n  --gradient-warm: linear-gradient(135deg, #ff6c52 0%, #ffb893 35%, #ffec9b 70%, #fffae5 100%);\n  --gradient-blob: radial-gradient(60% 80% at 80% 20%, #ff927e 0%, #feb7ab 30%, #ffec9b 60%, transparent 80%),\n                   radial-gradient(50% 70% at 20% 90%, #ffec9b 0%, #fff0b2 40%, transparent 70%);\n  --gradient-cover: linear-gradient(120deg, #010031 0%, #131144 35%, #3f3c66 55%, #ff927e 80%, #ffec9b 100%);\n}\n\n/* === KEYFRAMES === */\n@keyframes m-fade-in       { from { opacity: 0 } to { opacity: 1 } }\n@keyframes m-rise          { from { opacity: 0; transform: translateY(16px) } to { opacity: 1; transform: none } }\n@keyframes m-rise-lg       { from { opacity: 0; transform: translateY(28px) } to { opacity: 1; transform: none } }\n@keyframes m-slide-in-left { from { opacity: 0; transform: translateX(-24px) } to { opacity: 1; transform: none } }\n@keyframes m-blob-drift    { 0%, 100% { transform: translate(0, 0) scale(1) } 50% { transform: translate(20px, -16px) scale(1.04) } }\n@keyframes m-rule-grow     { from { transform: scaleX(0); transform-origin: left } to { transform: scaleX(1); transform-origin: left } }\n@keyframes m-pulse-soft    { 0%, 100% { opacity: .85 } 50% { opacity: 1 } }\n\n/* === ANIMATION UTILITIES === */\n.m-anim-fade   { animation: m-fade-in var(--dur-base) var(--ease-out-quart) both; }\n.m-anim-rise   { animation: m-rise var(--dur-slow) var(--ease-out-quart) both; }\n.m-anim-rise-lg{ animation: m-rise-lg var(--dur-slow) var(--ease-out-quart) both; }\n.m-anim-slide  { animation: m-slide-in-left var(--dur-slow) var(--ease-out-quart) both; }\n.m-anim-rule   { animation: m-rule-grow var(--dur-xslow) var(--ease-out-quart) both; }\n.m-anim-drift  { animation: m-blob-drift 14s ease-in-out infinite; }\n.m-anim-pulse  { animation: m-pulse-soft 4s ease-in-out infinite; }\n\n/* Stagger helpers — apply with .m-anim-rise.m-d1 etc. */\n.m-d1 { animation-delay:  80ms; } .m-d2 { animation-delay: 180ms; }\n.m-d3 { animation-delay: 280ms; } .m-d4 { animation-delay: 380ms; }\n.m-d5 { animation-delay: 480ms; } .m-d6 { animation-delay: 600ms; }\n\n/* Hover/press transitions baseline */\n.m-trans      { transition: all var(--dur-fast) var(--ease-out-quart); }\n.m-trans-bg   { transition: background var(--dur-fast) var(--ease-out-quart); }\n.m-trans-color{ transition: color var(--dur-fast) var(--ease-out-quart); }\n\n@media (prefers-reduced-motion: reduce) {\n  *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }\n}\n\n/* === BASE / SEMANTIC ELEMENT STYLES === */\nhtml, body {\n  margin: 0;\n  background: var(--bg);\n  color: var(--fg1);\n  font-family: var(--font-body);\n  font-size: var(--body);\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n}\n\nh1, h2, h3, h4, h5 {\n  font-family: var(--font-display);\n  color: var(--monterro-navy);\n  margin: 0 0 var(--space-4);\n  letter-spacing: -0.02em;\n  line-height: 1.1;\n}\nh1 { font-size: var(--h1); font-weight: 400; }\nh2 { font-size: var(--h2); font-weight: 500; }\nh3 { font-size: var(--h3); font-weight: 600; }\nh4 { font-size: var(--h4); font-weight: 600; }\nh5 { font-size: var(--h5); font-weight: 600; text-transform: none; }\n\np { margin: 0 0 var(--space-4); text-wrap: pretty; }\na { color: var(--link); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .15s; }\na:hover { border-bottom-color: currentColor; }\n\nsmall, .caption { font-size: var(--caption); color: var(--fg3); }\ncode, pre { font-family: var(--font-mono); font-size: 0.9em; }\n\n/* Signature accent line under section titles */\n.accent-line {\n  border: 0;\n  border-top: 2px solid var(--monterro-orange);\n  margin: var(--space-3) 0 var(--space-5);\n  width: 100%;\n}\n\n/* Buttons */\n.btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-family: var(--font-body);\n  font-weight: 600;\n  font-size: var(--body);\n  padding: 12px 22px;\n  border-radius: var(--radius-pill);\n  border: 1.5px solid transparent;\n  cursor: pointer;\n  transition: transform .12s ease, background .15s, color .15s, border-color .15s;\n}\n.btn:active { transform: translateY(1px); }\n.btn-primary { background: var(--monterro-navy); color: var(--monterro-offwhite); }\n.btn-primary:hover { background: #0a0945; }\n.btn-accent  { background: var(--monterro-orange); color: var(--monterro-offwhite); }\n.btn-accent:hover  { background: #fe5a3e; }\n.btn-ghost   { background: transparent; color: var(--monterro-navy); border-color: var(--monterro-navy); }\n.btn-ghost:hover { background: var(--monterro-navy); color: var(--monterro-offwhite); }\n\n/* Cards — minimal: thin border, generous padding, subtle shadow */\n.card {\n  background: var(--surface);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  padding: var(--space-6);\n  box-shadow: var(--shadow-sm);\n}\n\n/* Dark surface helper */\n.surface-dark {\n  background: var(--monterro-navy);\n  color: var(--monterro-offwhite);\n}\n.surface-dark h1, .surface-dark h2, .surface-dark h3, .surface-dark h4 { color: var(--monterro-offwhite); }\n<\u002Fstyle>\n<style>/* Caspeco workshop deck — slide-level styles atop monterro.css */\n\n/* ------- Type / Spacing scale (1920×1080) ------- */\n:root {\n  --s-title: 64px;\n  --s-subtitle: 44px;\n  --s-body: 32px;\n  --s-small: 26px;\n  --s-tiny: 22px;\n  --pad-x: 110px;\n  --pad-top: 100px;\n  --pad-bottom: 90px;\n  --gap-title: 44px;\n  --gap-item: 26px;\n}\n\ndeck-stage {\n  background: #000;\n}\n\n/* ------- Section / slide chrome ------- */\nsection {\n  font-family: var(--font-body);\n  color: var(--fg1);\n  background: var(--monterro-offwhite);\n  overflow: hidden;\n  position: relative;\n}\n\n/* Default content frame */\n.frame {\n  position: absolute;\n  inset: 0;\n  padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n  display: flex;\n  flex-direction: column;\n  box-sizing: border-box;\n}\n\n/* Logo lockup — top-right on content slides, bottom-right on covers */\n.logo-tr {\n  position: absolute;\n  top: 50px;\n  right: 70px;\n  width: 200px;\n  height: auto;\n  opacity: 0.95;\n}\n.logo-br {\n  position: absolute;\n  bottom: 50px;\n  right: 70px;\n  width: 230px;\n  height: auto;\n}\n\n/* Page number */\n.page-num {\n  position: absolute;\n  bottom: 44px;\n  left: var(--pad-x);\n  font-size: 18px;\n  color: var(--fg3);\n  letter-spacing: 0.04em;\n}\n\n/* ------- Titles ------- */\n.eyebrow {\n  font-size: var(--s-tiny);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--monterro-orange);\n  font-weight: 700;\n  margin: 0 0 24px;\n}\n\nh1.title {\n  font-size: var(--s-title);\n  font-weight: 500;\n  line-height: 1.05;\n  letter-spacing: -0.02em;\n  color: var(--monterro-navy);\n  margin: 0 0 var(--gap-title);\n  text-wrap: balance;\n}\n\n.title-rule {\n  border: 0;\n  height: 3px;\n  background: var(--monterro-orange);\n  width: 100%;\n  margin: 0 0 var(--gap-title);\n}\n\nh2.subtitle {\n  font-size: var(--s-subtitle);\n  font-weight: 400;\n  line-height: 1.1;\n  color: var(--monterro-navy);\n  letter-spacing: -0.01em;\n  margin: 0 0 var(--gap-title);\n}\n\np.body, li, td, th {\n  font-size: var(--s-body);\n  line-height: 1.45;\n}\n\n.small {\n  font-size: var(--s-small);\n  color: var(--fg2);\n  line-height: 1.45;\n}\n\n/* ------- Cover ------- */\nsection.cover {\n  background: linear-gradient(120deg, #010031 0%, #131144 35%, #3f3c66 55%, #ff927e 80%, #ffec9b 100%);\n  color: var(--monterro-offwhite);\n}\nsection.cover .frame {\n  justify-content: center;\n}\nsection.cover h1.title {\n  color: var(--monterro-offwhite);\n  font-size: 96px;\n  font-weight: 300;\n  letter-spacing: -0.025em;\n  max-width: 1300px;\n  margin-bottom: 32px;\n}\nsection.cover .subtitle {\n  color: var(--monterro-offwhite);\n  font-weight: 300;\n  font-size: 44px;\n  opacity: 0.92;\n  margin-bottom: 80px;\n  max-width: 1300px;\n}\nsection.cover .meta {\n  font-size: 24px;\n  color: var(--monterro-offwhite);\n  letter-spacing: 0.04em;\n  opacity: 0.85;\n}\n\n/* ------- Section divider ------- */\nsection.divider {\n  background: var(--monterro-navy);\n  color: var(--monterro-offwhite);\n}\nsection.divider .frame {\n  justify-content: center;\n}\nsection.divider .block-num {\n  font-size: var(--s-small);\n  color: var(--monterro-orange);\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  margin-bottom: 24px;\n  font-weight: 700;\n}\nsection.divider h1.title {\n  color: var(--monterro-offwhite);\n  font-size: 96px;\n  font-weight: 300;\n  letter-spacing: -0.025em;\n  margin-bottom: 28px;\n  max-width: 1400px;\n}\nsection.divider .tagline {\n  font-size: 36px;\n  color: var(--monterro-offwhite);\n  font-weight: 300;\n  font-style: italic;\n  opacity: 0.85;\n  max-width: 1300px;\n}\n\n/* Gradient blob bleeding in from a corner */\n.blob {\n  position: absolute;\n  pointer-events: none;\n  filter: blur(40px);\n  opacity: 0.85;\n}\n.blob-tr {\n  top: -260px;\n  right: -180px;\n  width: 900px;\n  height: 900px;\n  background: radial-gradient(closest-side, #ff927e 0%, #feb7ab 35%, #ffec9b 70%, transparent 100%);\n}\n.blob-bl {\n  bottom: -300px;\n  left: -200px;\n  width: 800px;\n  height: 800px;\n  background: radial-gradient(closest-side, #ffec9b 0%, #fff0b2 50%, transparent 100%);\n}\n\n/* ------- Tables ------- */\ntable.t {\n  width: 100%;\n  border-collapse: collapse;\n  font-size: var(--s-body);\n  text-align: left;\n}\ntable.t th, table.t td {\n  padding: 18px 22px;\n  border-bottom: 1px solid var(--border);\n  vertical-align: top;\n  line-height: 1.35;\n}\ntable.t th {\n  font-weight: 700;\n  color: var(--monterro-navy);\n  font-size: var(--s-small);\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n}\ntable.t tr:last-child td {\n  border-bottom: 0;\n}\ntable.t td.num, table.t th.num {\n  text-align: right;\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\";\n}\ntable.t .em {\n  color: var(--monterro-orange);\n  font-weight: 700;\n}\ntable.t.dense th, table.t.dense td {\n  padding: 12px 18px;\n  font-size: 25px;\n}\n\n/* ------- Bullet lists ------- */\nul.clean {\n  list-style: none;\n  padding: 0;\n  margin: 0;\n}\nul.clean li {\n  padding-left: 36px;\n  position: relative;\n  margin-bottom: var(--gap-item);\n  font-size: var(--s-body);\n  line-height: 1.4;\n}\nul.clean li::before {\n  content: \"\";\n  width: 10px;\n  height: 10px;\n  border-radius: 50%;\n  background: var(--monterro-orange);\n  position: absolute;\n  left: 0;\n  top: 18px;\n}\n\n/* Check / cross lists */\nul.checks li::before, ul.crosses li::before {\n  content: \"\";\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  background: transparent;\n  position: absolute;\n  left: 0;\n  top: 12px;\n}\nul.checks li, ul.crosses li {\n  padding-left: 48px;\n}\nul.checks li::before {\n  background: #d8f3e2;\n  color: #1a8b50;\n  content: \"✓\";\n  font-weight: 800;\n  font-size: 18px;\n  line-height: 28px;\n  text-align: center;\n}\nul.crosses li::before {\n  background: #fbdcd8;\n  color: #c73a25;\n  content: \"✗\";\n  font-weight: 800;\n  font-size: 18px;\n  line-height: 28px;\n  text-align: center;\n}\n\n/* ------- Pull-quote ------- */\n.pullquote {\n  font-size: 56px;\n  line-height: 1.15;\n  font-weight: 400;\n  color: var(--monterro-navy);\n  letter-spacing: -0.01em;\n  position: relative;\n  padding-left: 32px;\n  border-left: 4px solid var(--monterro-orange);\n  text-wrap: balance;\n}\n.pullquote .source {\n  display: block;\n  margin-top: 32px;\n  font-size: 26px;\n  color: var(--fg2);\n  font-weight: 400;\n  font-style: normal;\n}\n\n/* ------- Big stat ------- */\n.bigstat {\n  font-size: 280px;\n  line-height: 0.95;\n  font-weight: 300;\n  color: var(--monterro-navy);\n  letter-spacing: -0.04em;\n}\n.bigstat .unit {\n  font-size: 96px;\n  color: var(--monterro-orange);\n  font-weight: 400;\n}\n\n/* ------- Code blocks ------- */\npre.code {\n  background: var(--monterro-navy);\n  color: var(--monterro-offwhite);\n  font-family: var(--font-mono);\n  font-size: 22px;\n  line-height: 1.55;\n  padding: 32px 36px;\n  border-radius: var(--radius-md);\n  margin: 0;\n  overflow: hidden;\n  box-shadow: var(--shadow-md);\n  white-space: pre;\n  tab-size: 2;\n}\npre.code .c-key { color: #ffec9b; }\npre.code .c-str { color: #ff927e; }\npre.code .c-com { color: #80819a; }\npre.code .c-fn  { color: #8FECEB; }\n\npre.code.light {\n  background: #fff;\n  color: var(--monterro-navy);\n  border: 1px solid var(--border);\n}\n\n/* ------- Callout / takeaway box ------- */\n.callout {\n  font-size: var(--s-body);\n  line-height: 1.4;\n  color: var(--monterro-navy);\n  font-weight: 600;\n  padding: 28px 32px;\n  background: var(--monterro-sand);\n  border-radius: var(--radius-md);\n  margin-top: var(--gap-item);\n}\n.callout .accent { color: var(--monterro-orange); }\n\n/* ------- Demo / Hands-on labels ------- */\n.label-tag {\n  display: inline-block;\n  font-size: 20px;\n  font-weight: 800;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  padding: 8px 18px;\n  border-radius: 4px;\n  margin-bottom: 22px;\n}\n.label-demo { background: var(--monterro-navy); color: var(--monterro-offwhite); }\n.label-handson { background: var(--monterro-orange); color: var(--monterro-offwhite); }\n.label-question { background: var(--monterro-aqua); color: var(--monterro-offwhite); }\n\n/* Hands-on tinted bg */\nsection.handson { background: var(--yellow-100); }\nsection.demo {\n  background: var(--monterro-navy);\n  color: var(--monterro-offwhite);\n}\nsection.demo h1.title, section.demo h2.subtitle, section.demo .eyebrow {\n  color: var(--monterro-offwhite);\n}\nsection.demo .eyebrow { color: var(--monterro-orange); }\nsection.demo pre.code { box-shadow: 0 24px 60px -12px rgba(0,0,0,0.5); }\nsection.demo .small { color: var(--fg-on-dark-2); }\n\n/* ------- 2-col grids ------- */\n.cols {\n  display: grid;\n  gap: 56px;\n  align-items: start;\n}\n.cols-2 { grid-template-columns: 1fr 1fr; }\n.cols-3 { grid-template-columns: 1fr 1fr 1fr; }\n\n/* Card variant for column items */\n.col-card {\n  background: #fff;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  padding: 36px 36px;\n  box-shadow: var(--shadow-sm);\n}\n.col-card .h {\n  font-size: var(--s-small);\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--monterro-orange);\n  font-weight: 700;\n  margin-bottom: 14px;\n}\n.col-card .h.alt {\n  color: var(--monterro-navy);\n}\n.col-card .v {\n  font-size: 36px;\n  line-height: 1.15;\n  color: var(--monterro-navy);\n  font-weight: 500;\n  margin-bottom: 12px;\n}\n\n/* Soft section background variants */\nsection.warm { background: var(--monterro-sand); }\nsection.gradient {\n  background: var(--gradient-warm);\n  color: var(--monterro-navy);\n}\n\n/* Used inline */\n.kbd {\n  display: inline-block;\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  background: rgba(1,0,49,0.08);\n  border: 1px solid rgba(1,0,49,0.12);\n  border-radius: 6px;\n  padding: 2px 10px;\n  margin: 0 2px;\n  font-weight: 700;\n  color: var(--monterro-navy);\n}\nsection.demo .kbd, section.divider .kbd {\n  background: rgba(255,255,255,0.12);\n  color: var(--monterro-offwhite);\n  border-color: rgba(255,255,255,0.2);\n}\n\n/* Misc */\n.muted { color: var(--fg2); }\n.orange { color: var(--monterro-orange); }\n.navy { color: var(--monterro-navy); }\n.center { text-align: center; }\n.row { display: flex; align-items: center; gap: 24px; }\n\n/* Footer-ish on cover */\n.cover-foot {\n  position: absolute;\n  bottom: 60px;\n  left: var(--pad-x);\n  right: var(--pad-x);\n  display: flex;\n  justify-content: space-between;\n  align-items: end;\n  color: var(--monterro-offwhite);\n  font-size: 22px;\n  letter-spacing: 0.04em;\n}\n<\u002Fstyle>\n<script src=\"56438044-2283-471b-83f5-bead61706f4c\"><\u002Fscript>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n\"Welcome and intro frame. The agent IS a new colleague — that's the metaphor for the whole day. This is not a Claude class. The agent is interchangeable. The discipline you wrap around her is what compounds,\\n and that discipline is the workshop.\",\n\"Quick walkthrough. Demo means I run it live. Hands-on means you do it in pairs. Morning sets the foundation — context discipline plus AGENTS.md. That's where the 4.4× lift comes from per the Red Hat data. After lunch,\\n optional,\\n we run the same loop end-to-end on a real repo — Slack message all the way to a merged PR. Bring a real backlog ticket to lunch.\",\n\"Quick intro. I'm Per,\\n I work on AI and agentic development across Monterro's portfolio. I've run this format with several teams. Everything you'll hear today is based on what's working in production right now,\\n in 2026.\",\n\"Round the table. Max one minute each. I want to know who you are,\\n what you build,\\n which AI tools you use daily,\\n whether you run them in chat or agentic mode,\\n and one sentence on what worked and what didn't last week. The 'what didn't' answer is the gold — it surfaces exactly the failure modes today's discipline addresses.\",\n\"Block one. Context is the foundation. The whole day rests on this. Everything we do today — AGENTS.md,\\n skills,\\n hooks,\\n subagents — is one answer to one question: how do I keep her desk clean and high-signal?\",\n\"The n² fact. Attention is all you need — Vaswani 2017 — for n tokens the model computes n-squared pairwise relationships. A thousand tokens,\\n a million relationships. Ten thousand,\\n a hundred million. A hundred thousand,\\n ten billion. Each token added doesn't just cost more money — it dilutes attention for every other token. Double the context,\\n quadruple the work and the noise and the latency. That's why context rot kicks in well before the window is full.\",\n\"Plant the metaphor immediately. She's not a chatbot. She's a new colleague. The best one you'll ever hire — reads code 200 times faster than you,\\n doesn't get tired,\\n costs about one and a half percent of a senior salary. But on day one she knows nothing about your architecture,\\n your conventions,\\n your domain language. Without onboarding she guesses. With onboarding she delivers. That's the workshop.\",\n\"Mitchell Hashimoto coined this term,\\n Martin Fowler made it canonical in April 2026. Agent equals model plus harness. The model is her brain — Claude,\\n GPT-5,\\n Gemini — increasingly commodity. The harness is her workplace — onboarding docs,\\n policies,\\n tools,\\n sandboxes,\\n the team around her. Eighty-eight percent of AI agent projects that fail,\\n fail at the harness level,\\n not the model level. Today is about the harness.\",\n\"Everything she works with sits on her desk. When it's full,\\n things fall off. Two hundred K tokens sounds like a lot — about five hundred pages of code. Fills up faster than you think. Each A4 page is roughly five hundred tokens. Full? Oldest sheets fall off — she forgets what you talked about fifty sheets ago.\",\n\"This is the model people miss. They think the agent is talking to GPT — actually every turn re-uploads everything she's seen so far. Walk through the desk top to bottom. Always-loaded stuff sits permanently. On-demand stuff loads when needed. Two clever moves: skills load only their description,\\n body comes in on demand. And subagents have their own desk entirely. This slide is the why behind everything that follows.\",\n\"One illustration. Status bar at three fills. Smart zone,\\n dumb zone. The rule — around one hundred K tokens,\\n run /clear. Chroma research,\\n 2025: eighteen frontier models tested,\\n every one degrades past that mark regardless of advertised window size. And the new one-million-token windows? They haven't fixed context rot — they've just extended the dumb zone. Great for internal RAG where you're retrieving facts. Bad for code,\\n where every token competes for attention. The status bar is your fuel gauge. If you ever wonder why she's getting lazy or inventing APIs — check the bar first.\",\n\"Show this live during the talk. /statusline is the single most useful command in Claude Code — and most people in the room have never run it. The mini-dashboard puts model, context %, cost, and branch on screen at all times. The prompt on the slide is exactly what you type — Claude generates the shell script, saves it to .claude/statusline.sh, and every future session in that repo inherits it. Tie back to the previous slide: this IS the fuel gauge. When the bar crosses the rot threshold, /clear. When cost surprises you, you're using Sonnet where Haiku would do. When you're on the wrong branch, you find out before the agent commits. One prompt, runs once per repo, every future session has it.\",\n\"OK so what do you do about it? Phase the work. Each phase gets a fresh desk. Big task in a single context,\\n the desk fills up halfway through and the last steps run on a polluted desk. Phased instead: phase A,\\n /clear,\\n phase B,\\n /clear,\\n phase C. Two wins from one move — quality,\\n because each phase runs in the smart zone,\\n and throughput,\\n because independent phases run in parallel using git worktrees. With a growing team,\\n parallel phases is where the throughput multiplier lives. One human can supervise three or four phased agents simultaneously.\",\n\"Two commands,\\n one mental model. /clear sweeps the desk. Use it between phases — Plan,\\n Build,\\n Verify. /compact squeezes the conversation into a summary. Use it when you need continuity. Show /context live — most people have never opened it. Past the rot threshold you're already in the dumb zone,\\n so /clear before that.\",\n\"This is the through-line. Bind the whole day in one slide. Every tool we show today is one answer to the same question: how do I keep her desk clean and high-signal? AGENTS.md,\\n the always-loaded brief. Skills,\\n pulled in only when needed. Subagents,\\n own desk,\\n return summary. Hooks,\\n run outside the LLM. Plan Mode,\\n read-only fresh desk. Come back to this slide whenever someone asks why so much complexity with four different files.\",\n\"Validation is the foundation,\\n not an afterthought. Agents work in a tight loop — write,\\n run,\\n read result,\\n adjust. No tests,\\n no loop. Three layers,\\n three jobs. BDD tests acceptance — Given-When-Then,\\n the contract with the stakeholder,\\n lives in the issue so Copilot reads it before writing code. TDD tests the code itself — red,\\n green,\\n refactor,\\n the unit-level loop the agent runs in seconds. Playwright tests the UI end-to-end in a real browser — closes the last feedback gap the agent can't see by reading code alone. The takeaway: the agent's effectiveness is bounded by your test surface. If you can't test it,\\n you can't ship it AFK.\",\n\"Block two. AGENTS.md — the handbook. The single most important file in your project.\",\n\"Generic example,\\n works for any stack. She means well — she just doesn't know. Burns tokens is concrete: a task that should take ten K can balloon to fifty K plus when she guesses wrong and has to backtrack.\",\n\"Same agent,\\n same prompt — fifteen lines of text make the difference. That's why AGENTS.md is today's single most important file. Bounded contexts: different parts of a stack speak different dialects — services,\\n integrations,\\n scheduling. The agent must know which context she's in.\",\n\"Red Hat published this in April 2026. Hard data — not vibes. Twelve to fifty-three isn't a bit better — it's the same developers shipping four point four times the code through the agent. One markdown file. Checked into git. Read by every agent on every session. This is the slide that motivates Hands-on 1. Land it hard.\",\n\"One hundred fifty lines isn't arbitrary. Anthropic recommends sixty,\\n but a hundred fifty works well for B2B teams. Longer and humans stop reading it,\\n AND it starts drowning her context. Sixty seconds to scan is the acceptance criterion. File-line references beat code snippets — snippets go stale,\\n line refs update automatically.\",\n\"AGENTS.md is soft rules — she respects them but it's judgment. Settings.json is hard permissions — she can't even try. Stop rules examples are placeholders — confirm the actual sensitive surfaces with the team. The if-unsure-stop-and-ask line combined with the unresolved-questions line is very powerful.\",\n\"The LLM is the brain. You don't teach a senior colleague how to write camelCase. Generic rules steal space from what's actually specific to your project. Rule of thumb: if the rule applies to every C# project on Earth,\\n skip it. If it applies to yours,\\n write it.\",\n\"This is the right framing for most teams. Most of the room is on Plan Mode plus AGENTS.md,\\n not yet on grill-me. These two lines protect them today. List unresolved questions — she tells you what she doesn't know instead of guessing. Be concise — plans become scannable. Once /grill-me is in your flow,\\n drop them. The framework owns the discipline now. Pocock's walk-back is worth naming because most engineers copied 'be concise' from earlier blog posts. He himself dropped it once the grilling replaced the need.\",\n\"Pocock's framing. AGENTS.md isn't a one-time setup — it's a living document,\\n reviewed every sprint,\\n as important as code review. The two-mistake rule: don't write everything up front,\\n let mistakes drive it. Third time she forgets X,\\n new line in AGENTS.md.\",\n\"Hierarchy matters — backend and frontend have different rules,\\n nearest wins. Same agent,\\n different rules per context. Multi-repo orgs — core plus integrations — each gets its own AGENTS.md,\\n optionally one shared at root.\",\n\"Before 2025,\\n every tool had its own file. Switching tools meant rewriting everything. Since 2025,\\n AGENTS.md is the industry standard. Sixty thousand plus repos. Claude Code reads CLAUDE.md,\\n so symlink it to AGENTS.md — no rules in two places. Teams running both Claude Code and Copilot get one AGENTS.md feeding both. No lock-in.\",\n\"Land this hard. Most engineers' first instinct is to type /init and walk away. The cost is invisible — every session loads a bloated handbook that crowds her desk and dilutes the rules that actually matter. The shortcut isn't the right tool here. The next slide shows the prompt that does the job properly. Most teams already have an AGENTS.md generated from /init — today's hands-on is partly the chance to redo it properly.\",\n\"Live demo. Run this prompt against your own repo. This produces a focused AGENTS.md that matches your codebase. File-line instead of code snippets means it updates automatically with the code. Last line — symlink AGENTS.md to CLAUDE.md — Claude Code reads it,\\n no duplicates.\",\n\"Fifteen minutes for a first version,\\n not perfect,\\n that's fine. I'll circulate to help anyone with a strange repo structure. The test in step three is the point — AGENTS.md isn't born finished,\\n it grows out of mistakes. Take it home,\\n review with the team this week,\\n add two or three stop rules based on what you know she tends to get wrong.\",\n\"Ten minute break. We continue right after.\",\n\"Block three. The toolkit — Skills,\\n Commands,\\n Hooks,\\n Subagents. The audience already uses all of these. The point is not to teach mechanics. It's to reframe each one through the context-cost lens from Block 1. Each tool exists to keep her desk clean while expanding what she can do.\",\n\"Tie back explicitly to Block 1's context-is-the-bottleneck slide. This is the same question,\\n four different answers. Most teams already use all of these — the value of this block is the shared mental model of when to use which.\",\n\"Show the actual SKILL.md file. It's genuinely three sentences — that's the punch. The reframing: a skill costs roughly eighty tokens of context,\\n the description,\\n not the full body. The grill-me body is tiny anyway,\\n but the principle scales. A five-K-token skill body still only costs you eighty tokens of desk space until invoked. Tease the afternoon: this skill,\\n on Anna's brief,\\n is exactly what we'll run after lunch.\",\n\"This connects Block 3 to the afternoon's BDD-driven implementation. Dollar-sign-ARGUMENTS is the killer feature — same command,\\n works on any issue ID or local file. The /bdd-in-issue command directly addresses the Jira-to-Copilot handoff failure mode. Once it's in your flow,\\n Copilot stops guessing. Boris Cherny ships about a hundred PRs a week,\\n partly because /commit-push-pr is muscle memory.\",\n\"Hooks versus AGENTS.md: AGENTS.md is advisory,\\n judgment-based. Hooks are deterministic — the rule fires whether she likes it or not. The pre-commit-hook analogy lands — humans don't push to main,\\n hooks make sure the agent can't either. A typical settings.json deny-list is the same idea — no rm-dash-rf,\\n no destructive db migrations.\",\n\"Subagents are the most underused tool. Most teams have them available but aren't using them daily. The own-desk framing is the killer pedagogy — it makes the value obvious. Practical patterns: a /review-pr subagent that reads the diff and returns a verdict; an /explore-module subagent that maps an unfamiliar area.\",\n\"Print this slide. Pin it next to the desks. It's the daily decision tree. Walk through each row with an example from your stack. Common mistake: putting a skill's content into AGENTS.md to make sure she always knows it. That crowds the desk every session. Same for hooks-as-AGENTS.md — she keeps forgetting to run tests,\\n that's a hook,\\n not a rule.\",\n\"This is Boris Cherny's framing — creator of Claude Code,\\n ships about a hundred PRs a week. Worth name-dropping. The killer phase most teams skip is Simplify. After build,\\n the agent typically over-engineers. One prompt — can you remove anything without breaking tests — typically removes twenty to forty percent of the diff. /clear between phases is non-negotiable. Plan-context bleeding into build means wrong architecture defended into the code. This bridges to the afternoon — the demo arc IS this loop,\\n end-to-end.\",\n\"Block four. Where everything lives. Storage,\\n spec rot,\\n the close-the-ticket rule. Short but always asked.\",\n\"The folder tree IS the slide. Walk top to bottom. What if I don't use GitHub Issues — point at issues/ and say Pocock's pattern,\\n plain markdown files,\\n works offline. Real backlog item from Jira,\\n mirror as a GH issue. Demo or solo experiment,\\n just use issues/ in the repo.\",\n\"This is much simpler than the keep-your-living-spec-up-to-date advice most teams try and fail to follow. Stop treating specs as long-lived artifacts. Each ticket is a delivery. The spec belongs to that delivery. Close the ticket — freeze the spec. ADRs are the exception — append-only,\\n decision-level,\\n don't suffer the same rot. Post-merger,\\n the codebase shifts a lot. Closing tickets gives you a clean per-feature record without anyone maintaining a master document.\",\n\"Closing the morning. Pull the threads together. Land the four point four times data point one more time.\",\n\"Five takeaways in priority order. If you only do one and two — context discipline plus a hundred-fifty-line AGENTS.md — you've already captured most of the lift. Everything else is multiplier on top.\",\n\"Three concrete next steps. The slide is generic on purpose — the magic is in making them specific. Tell the room: take two minutes,\\n translate each box into your stack. Tonight becomes — finish the AGENTS.md slice with our logging conventions and pnpm test command. This week becomes — add a Stop hook running pnpm typecheck plus pnpm test:unit. This quarter becomes — propose at the May 14 sprint planning that every new Jira ticket carries BDD scenarios. Then — turn to your neighbour and say all three out loud. Verbalising a commitment to a colleague is the difference between intent and action on Monday.\",\n\"After the closing reflection,\\n fifteen-minute lunch break — bring a real backlog ticket. Then we run the loop end-to-end on a real repo.\",\n\"Set up the afternoon arc. Five steps from fuzzy idea to shipped slice. Steps one through three and step five are human-in-the-loop — alignment,\\n decisions,\\n review. Step four is AFK — once the issue is well-shaped,\\n the agent runs while you do other work. The whole loop is Pocock's,\\n battle-tested in production. We'll run it end-to-end on a sample repo,\\n then you do the same on your own ticket.\",\n\"Step one. The most important shift in mindset. Don't ask the agent for a plan — reach a shared design concept first. Slash grill-me walks the design tree,\\n asks one question at a time,\\n gives its recommended answer,\\n and refuses to draft anything until you're aligned. Sessions can run twenty to eighty questions. That's the point — every answer is a decision the agent would otherwise hallucinate. The output isn't a spec,\\n it's a conversation history. Twenty-five K tokens of gold. Do this with humans in the room — domain expert plus dev plus agent. Mob-prompt the hard decisions.\",\n\"Step two. Slash to-prd summarises the grilling into a destination document. Problem,\\n solution,\\n user stories,\\n implementation decisions,\\n testing decisions. The big counter-intuitive point: you don't need to read it. You already share the design concept — the grilling did that. The PRD is just the agent summarising,\\n and LLMs are excellent at summarisation. You'll catch any drift at issue-creation time,\\n where it's still cheap. The PRD lives in the issue. Repo mirror is optional and temporary — same rule as before.\",\n\"Step three. The most important step in the whole flow. Cut vertically,\\n not by layer. Left side is what AI defaults to — all the schema,\\n then all the API,\\n then all the UI. No feedback until phase three. Agent codes blind for hours. Right side is tracer bullets — each slice ships something visible end-to-end. Schema bit plus service plus minimal UI. Feedback every slice. Hunt and Thomas,\\n Pragmatic Programmer,\\n twenty-five years old,\\n still right.\",\n\"Step three's output. A canban of independently grabbable issues. Each issue carries enough context to be picked up cold by a fresh agent. Note the structure — once issue one is shipped,\\n issues two and four can run in parallel on separate agents because they only depend on one. That's the DAG paying off. Directed acyclic graph — graph,\\n not queue. This is how parallelism actually works in practice.\",\n\"This is where Pocock's loop meets your stack. In practice — Jira issue mirrored to a GitHub issue,\\n assigned to a Copilot agent,\\n PR comes back. The Jira ticket is the source of truth,\\n the GitHub issue is the agent's working copy. Once unblocking slice merges,\\n you assign issues two and four to two different Copilot agents — that's the DAG paying off. You're reviewing PRs,\\n not driving keystrokes. BDD lives in the ticket so Copilot has the acceptance contract before it starts. One issue,\\n one branch,\\n one PR,\\n close — no long-lived spec branches.\",\n\"Step four. Now it's AFK. The flow per issue — slash clear back to Momento,\\n read AGENTS.md to onboard,\\n read the issue which is the destination,\\n plan,\\n implement,\\n test,\\n open PR,\\n close issue,\\n spec frozen. Four things make this AFK-safe. The issue is the contract — if grill-me did its job,\\n the agent isn't guessing. Stop hooks run build and tests,\\n no works-on-my-machine PRs. Fresh context per issue,\\n no sediment from the previous slice. And vertical slice means working software at the end of every issue. You're not watching it type. You're reviewing PRs.\",\n\"Step five. Don't skip the review. Code is your battleground — bad codebases produce bad agents,\\n don't let entropy in. Read the diff,\\n not the spec — the PRD was a destination,\\n the diff is what shipped. Catch drift at the PR,\\n not three slices later. Then close ruthlessly. PR merges,\\n close the issue. If the spec lived in the repo,\\n delete it. Future change means new issue,\\n not edits to the old one. Closed tickets are a perfect record of what the system was at that moment. The living-spec anti-pattern is sidestepped entirely.\",\n\"Linear's ritual. Thomas Kessler,\\n their CTO,\\n runs this with a twenty-five-engineer team. Every Wednesday,\\n thirty-minute call — each engineer demos one quality fix they made that week. Range from one-pixel UI tweak to backend perf win,\\n two minutes each. The rule is the punch — you have to find your own fix,\\n no one hands them to you. Two thousand five hundred to three thousand fixes since starting. The real point is the side effect,\\n not the meeting — devs become quality-attuned because they know the demo is coming,\\n so they introduce fewer regressions in the first place. Fifteen minutes a week,\\n every dev brings one self-found improvement. Cheapest quality ratchet you can install on Monday morning.\",\n\"One slide,\\n clickable links,\\n on screen during Q&A. Pocock's grill-me went viral post is the canonical write-up — point engineers there if they want the long-form rationale.\",\n\"Credits matter. The room takes recommendations more seriously when they see this isn't vibes — it's standing on twenty-five years of software craft plus two years of agentic-dev practice. Don't read every row. Land three: Vaswani,\\n the science behind why context matters; Beck and North,\\n the practice tradition under BDD and TDD; Pocock,\\n the modern open-source layer that ties it all together. The job today wasn't to invent. It was to integrate.\",\n\"Five minutes. If a question is deep or specific — let's pair on it after,\\n I'll be on Discord. Don't burn the room's time on one issue.\"\n]\n<\u002Fscript>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ============= 01 COVER ============= -->\n<section data-label=\"01 Cover\" class=\"cover\">\n  <div class=\"frame\">\n    <div style=\"max-width: 1300px;\">\n      <h1 class=\"title\">Agentic Development Workshop<\u002Fh1>\n      <h2 class=\"subtitle\">Your new colleague needs an onboarding.<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"cover-foot\">\n    <div style=\"font-size: 26px;\">Per Hassle &nbsp;·&nbsp; Monterro &nbsp;·&nbsp; <span style=\"opacity: 0.85;\">github.com/phassle<\u002Fspan><\u002Fdiv>\n    <img src=\"8ba37f83-809a-4d28-b561-096279cc4378\" alt=\"Monterro\" style=\"height: 56px;\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 02 AGENDA ============= -->\n<section data-label=\"02 Agenda\">\n  <div class=\"frame\">\n    <h1 class=\"title\" style=\"margin-bottom: 24px; font-size: 56px;\">Today's agenda<\u002Fh1>\n    <hr class=\"title-rule\" style=\"margin-bottom: 24px;\">\n    <table class=\"t dense\" style=\"font-size: 22px;\">\n      <thead>\n        <tr><th style=\"width:36%;\">Block<\u002Fth><th>Focus<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td style=\"padding:8px 18px;\">Welcome &amp; round the table<\u002Ftd><td class=\"muted\" style=\"padding:8px 18px;\">What you've tried so far<\u002Ftd><\u002Ftr>\n        <tr><td><strong>1 &nbsp;·&nbsp; Context is the foundation<\u002Fstrong><\u002Ftd><td>Desk &nbsp;·&nbsp; tokens = memory &nbsp;·&nbsp; <span class=\"kbd\">/clear<\u002Fspan> &nbsp;·&nbsp; <span class=\"kbd\">/compact<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>2 &nbsp;·&nbsp; AGENTS.md, the handbook<\u002Fstrong><\u002Ftd><td>Max 150 lines &nbsp;·&nbsp; stop rules &nbsp;·&nbsp; the 4.4× data<\u002Ftd><\u002Ftr>\n        <tr><td><span class=\"orange\"><strong>Hands-on 1<\u002Fstrong><\u002Fspan><\u002Ftd><td>Generate your AGENTS.md (15 min)<\u002Ftd><\u002Ftr>\n        <tr><td>Break<\u002Ftd><td class=\"muted\">10 min<\u002Ftd><\u002Ftr>\n        <tr><td><strong>3 &nbsp;·&nbsp; The toolkit<\u002Fstrong><\u002Ftd><td>Skills · Commands · Hooks · Subagents — the decision matrix<\u002Ftd><\u002Ftr>\n        <tr><td><strong>4 &nbsp;·&nbsp; Where everything lives<\u002Fstrong><\u002Ftd><td><span class=\"kbd\">specs/<\u002Fspan> vs <span class=\"kbd\">issues/<\u002Fspan> &nbsp;·&nbsp; spec rot &nbsp;·&nbsp; close-the-ticket<\u002Ftd><\u002Ftr>\n        <tr><td>Closing the morning<\u002Ftd><td class=\"muted\">Five takeaways &nbsp;·&nbsp; three next steps<\u002Ftd><\u002Ftr>\n        <tr><td>Lunch<\u002Ftd><td class=\"muted\">Bring a real backlog ticket<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Afternoon demo<\u002Fstrong> (~25 min)<\u002Ftd><td>Slack-to-PR arc on a real repo<\u002Ftd><\u002Ftr>\n        <tr><td><span class=\"orange\"><strong>Hands-on 2<\u002Fstrong><\u002Fspan> (~55 min)<\u002Ftd><td>Run the same loop on a real backlog ticket of your own<\u002Ftd><\u002Ftr>\n        <tr><td>Reflection &amp; close<\u002Ftd><td class=\"muted\">Three next steps<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 03 WELCOME ============= -->\n<section data-label=\"03 Welcome\">\n  <div class=\"frame\" style=\"justify-content: center;\">\n    <div class=\"eyebrow\">Welcome<\u002Fdiv>\n    <h1 class=\"title\" style=\"font-size: 96px; font-weight: 300;\">Per Hassle<\u002Fh1>\n    <hr class=\"title-rule\" style=\"width: 200px; height: 4px;\">\n    <h2 class=\"subtitle\" style=\"margin-bottom: 40px;\">Monterro<\u002Fh2>\n    <p class=\"body\" style=\"font-size: 36px; max-width: 1100px; color: var(--fg2);\">AI &amp; agentic development across portfolio companies.<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 04 ROUND THE TABLE ============= -->\n<section data-label=\"04 Round the table\">\n  <div class=\"frame\">\n    <span class=\"label-tag label-question\">Round the table<\u002Fspan>\n    <h1 class=\"title\">Tell me a little about you.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <ul class=\"clean\" style=\"margin-top: 20px;\">\n      <li>Who are you? What do you build?<\u002Fli>\n      <li>Which AI tools do you use daily? <span class=\"muted\">(Claude · Copilot · Cursor · …)<\u002Fspan><\u002Fli>\n      <li>Chat-style or agentic?<\u002Fli>\n      <li>One sentence: what worked, what didn't last week.<\u002Fli>\n    <\u002Ful>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 05 BLOCK 1 DIVIDER ============= -->\n<section data-label=\"05 Block 1 divider\" class=\"divider\">\n  <div class=\"blob blob-tr\"><\u002Fdiv>\n  <div class=\"blob blob-bl\"><\u002Fdiv>\n  <div class=\"frame\">\n    <div class=\"block-num\">Block 1<\u002Fdiv>\n    <h1 class=\"title\">Context is the foundation.<\u002Fh1>\n    <p class=\"tagline\">Tokens = memory. Attention is the bottleneck — it scales <em>n²<\u002Fem>.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============= 06 N² SCALING (BIG STAT) ============= -->\n<section data-label=\"06 N squared\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Why context discipline matters<\u002Fdiv>\n    <h1 class=\"title\">Double the context, quadruple the work.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-3\" style=\"margin-top: 20px; align-items: stretch;\">\n      <div class=\"col-card\">\n        <div class=\"h alt\">1K tokens<\u002Fdiv>\n        <div class=\"v\">1 million<\u002Fdiv>\n        <div class=\"small\">pairwise relationships<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col-card\">\n        <div class=\"h alt\">10K tokens<\u002Fdiv>\n        <div class=\"v\">100 million<\u002Fdiv>\n        <div class=\"small\">pairwise relationships<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"col-card\" style=\"background: var(--monterro-navy); color: var(--monterro-offwhite); border-color: var(--monterro-navy);\">\n        <div class=\"h\" style=\"color: var(--monterro-orange);\">100K tokens<\u002Fdiv>\n        <div class=\"v\" style=\"color: var(--monterro-offwhite);\">10 billion<\u002Fdiv>\n        <div class=\"small\" style=\"color: var(--fg-on-dark-2);\">pairwise relationships<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\">\n      Each token added doesn't just cost more money — it <span class=\"accent\">dilutes attention<\u002Fspan> for every other token.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 07 NEW DEVELOPER ============= -->\n<section data-label=\"07 New developer\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Reframe<\u002Fdiv>\n    <h1 class=\"title\">She's not a chatbot. She's <span class=\"orange\">a new colleague.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 24px;\">\n      <div>\n        <h3 style=\"font-size: 30px; color: var(--monterro-navy); margin-bottom: 18px;\">The best one you'll ever hire<\u002Fh3>\n        <ul class=\"clean\">\n          <li>Reads code 200× faster than you<\u002Fli>\n          <li>Doesn't get tired, doesn't get bored<\u002Fli>\n          <li>Costs ~1.4 % of a senior salary<\u002Fli>\n          <li>Available 24/7<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 30px; color: var(--monterro-navy); margin-bottom: 18px;\">But on day 1 she knows nothing about<\u002Fh3>\n        <ul class=\"clean\">\n          <li>your architecture<\u002Fli>\n          <li>your conventions<\u002Fli>\n          <li>your domain language<\u002Fli>\n          <li>where the boundaries are<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 36px;\">\n      Without onboarding she <span class=\"accent\">guesses.<\u002Fspan>&nbsp;&nbsp;&nbsp; With onboarding she <span class=\"accent\">delivers.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 08 AGENT = MODEL + HARNESS ============= -->\n<section data-label=\"08 Model plus harness\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Hashimoto · Fowler &nbsp;·&nbsp; 2026<\u002Fdiv>\n    <h1 class=\"title\" style=\"font-size: 88px; font-weight: 300;\">\n      Agent &nbsp;=&nbsp; <span class=\"orange\">Model<\u002Fspan> &nbsp;+&nbsp; <span class=\"navy\">Harness<\u002Fspan>\n    <\u002Fh1>\n    <hr class=\"title-rule\" style=\"margin-top: 12px;\">\n    <div class=\"cols cols-2\" style=\"margin-top: 32px;\">\n      <div class=\"col-card\">\n        <div class=\"h\">Model<\u002Fdiv>\n        <div class=\"v\">Her brain.<\u002Fdiv>\n        <p class=\"small\">Claude · GPT-5 · Gemini. Increasingly <strong>commoditised.<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n      <div class=\"col-card\" style=\"background: var(--monterro-navy); color: var(--monterro-offwhite); border-color: var(--monterro-navy);\">\n        <div class=\"h\" style=\"color: var(--monterro-orange);\">Harness<\u002Fdiv>\n        <div class=\"v\" style=\"color: var(--monterro-offwhite);\">Her workplace.<\u002Fdiv>\n        <p class=\"small\" style=\"color: var(--fg-on-dark-2);\">Onboarding docs, policies, tools, sandboxes, the team around her.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"callout\" style=\"margin-top: 40px; background: var(--monterro-sand);\">\n      <span class=\"accent\">88 %<\u002Fspan> of AI agent projects that fail, fail at the harness level — not the model level.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 09 HER DESK (SVG) ============= -->\n<section data-label=\"09 Her desk\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">The context window<\u002Fdiv>\n    <h1 class=\"title\">Everything sits on her desk. When it's full, things fall off.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <svg viewBox=\"0 0 1700 540\" style=\"width: 100%; height: auto; margin-top: 8px;\">\n      <defs>\n        <linearGradient id=\"deskg\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#ffffff\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#f3eee0\"><\u002Fstop>\n        <\u002FlinearGradient>\n      <\u002Fdefs>\n      <!-- desk surface -->\n      <rect x=\"20\" y=\"20\" width=\"1660\" height=\"500\" rx=\"20\" fill=\"url(#deskg)\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n      <text x=\"60\" y=\"68\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\" letter-spacing=\"3\">CONTEXT WINDOW &nbsp;·&nbsp; 200K – 1M tokens<\u002Ftext>\n\n      <!-- 5 paper rows -->\n      <g font-family=\"Arial\" font-size=\"28\" fill=\"#010031\">\n        <g>\n          <rect x=\"60\" y=\"100\" width=\"900\" height=\"56\" rx=\"6\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n          <text x=\"80\" y=\"138\">🔧&nbsp; System message<\u002Ftext>\n          <text x=\"900\" y=\"138\" text-anchor=\"end\" fill=\"#80819a\" font-size=\"24\">~5–10K<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"60\" y=\"170\" width=\"900\" height=\"56\" rx=\"6\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n          <text x=\"80\" y=\"208\">📋&nbsp; AGENTS.md<\u002Ftext>\n          <text x=\"900\" y=\"208\" text-anchor=\"end\" fill=\"#80819a\" font-size=\"24\">~2–5K<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"60\" y=\"240\" width=\"900\" height=\"56\" rx=\"6\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n          <text x=\"80\" y=\"278\">💬&nbsp; Your conversation<\u002Ftext>\n          <text x=\"900\" y=\"278\" text-anchor=\"end\" fill=\"#FC6C54\" font-size=\"24\" font-weight=\"700\">grows →<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"60\" y=\"310\" width=\"900\" height=\"56\" rx=\"6\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n          <text x=\"80\" y=\"348\">📖&nbsp; Files she's read<\u002Ftext>\n          <text x=\"900\" y=\"348\" text-anchor=\"end\" fill=\"#80819a\" font-size=\"24\">~1–5K each<\u002Ftext>\n        <\u002Fg>\n        <g>\n          <rect x=\"60\" y=\"380\" width=\"900\" height=\"56\" rx=\"6\" fill=\"#fff\" stroke=\"#e6e3da\"><\u002Frect>\n          <text x=\"80\" y=\"418\">▶️&nbsp; Tool results<\u002Ftext>\n          <text x=\"900\" y=\"418\" text-anchor=\"end\" fill=\"#80819a\" font-size=\"24\">varies<\u002Ftext>\n        <\u002Fg>\n      <\u002Fg>\n\n      <!-- side note -->\n      <g transform=\"translate(1040, 100)\">\n        <rect width=\"600\" height=\"350\" rx=\"14\" fill=\"#FFEC9B\" opacity=\"0.6\"><\u002Frect>\n        <text x=\"40\" y=\"60\" font-family=\"Arial\" font-size=\"32\" font-weight=\"700\" fill=\"#010031\">Tokens = memory.<\u002Ftext>\n        <text x=\"40\" y=\"110\" font-family=\"Arial\" font-size=\"26\" fill=\"#010031\">Each A4 page on her desk<\u002Ftext>\n        <text x=\"40\" y=\"146\" font-family=\"Arial\" font-size=\"26\" fill=\"#010031\">≈ 500 tokens.<\u002Ftext>\n        <line x1=\"40\" y1=\"180\" x2=\"560\" y2=\"180\" stroke=\"#FC6C54\" stroke-width=\"2\"><\u002Fline>\n        <text x=\"40\" y=\"222\" font-family=\"Arial\" font-size=\"24\" fill=\"#4a4b5c\">Full?<\u002Ftext>\n        <text x=\"40\" y=\"258\" font-family=\"Arial\" font-size=\"24\" fill=\"#4a4b5c\">Oldest sheets fall off<\u002Ftext>\n        <text x=\"40\" y=\"294\" font-family=\"Arial\" font-size=\"24\" fill=\"#4a4b5c\">— she forgets.<\u002Ftext>\n      <\u002Fg>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 10 EVERY TURN ============= -->\n<section data-label=\"10 Every turn\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Every keystroke costs<\u002Fdiv>\n    <h1 class=\"title\">Every turn re-uploads her entire desk.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 48px;\">\n      <div>\n        <div style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px;\">Always loaded<\u002Fdiv>\n        <ul class=\"clean\" style=\"margin-bottom: 32px;\">\n          <li><strong>System prompt<\u002Fstrong> &nbsp;<span class=\"muted\">~5–10K<\u002Fspan><\u002Fli>\n          <li><strong>AGENTS.md<\u002Fstrong> &nbsp;<span class=\"muted\">~2–5K<\u002Fspan><\u002Fli>\n          <li><strong>Skill descriptions<\u002Fstrong> &nbsp;<span class=\"muted\">~80 tok each<\u002Fspan><\u002Fli>\n          <li><strong>Conversation so far<\u002Fstrong> &nbsp;<span class=\"muted\">grows every turn<\u002Fspan><\u002Fli>\n          <li><strong>Files read · tool output<\u002Fstrong> &nbsp;<span class=\"muted\">stays all session<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 16px;\">On demand<\u002Fdiv>\n        <ul class=\"clean\">\n          <li><strong>Skill body<\u002Fstrong> &nbsp;loads only when invoked<\u002Fli>\n          <li><strong>Subagent<\u002Fstrong> &nbsp;own desk · returns only a summary<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 32px;\">\n          Two clever moves: skills hide their body until needed, subagents work on a different desk entirely.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 11 CONTEXT ROT ============= -->\n<section data-label=\"11 Context rot\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Chroma research · 2025 · 18 frontier models<\u002Fdiv>\n    <h1 class=\"title\"><span class=\"kbd\" style=\"font-size: 0.85em;\">/clear<\u002Fspan> around 100 K tokens.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <!-- status bar viz -->\n    <svg viewBox=\"0 0 1700 220\" style=\"width: 100%; height: auto; margin-top: 8px;\">\n      <!-- track -->\n      <rect x=\"20\" y=\"80\" width=\"1640\" height=\"60\" rx=\"30\" fill=\"#f3eee0\" stroke=\"#e6e3da\" stroke-width=\"2\"><\u002Frect>\n      <!-- 100K mark -->\n      <line x1=\"676\" y1=\"60\" x2=\"676\" y2=\"160\" stroke=\"#FC6C54\" stroke-width=\"3\" stroke-dasharray=\"6 6\"><\u002Fline>\n      <text x=\"676\" y=\"48\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">~100 K tokens<\u002Ftext>\n      <text x=\"676\" y=\"200\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#FC6C54\">/clear here<\u002Ftext>\n      <!-- smart zone fill -->\n      <rect x=\"20\" y=\"80\" width=\"656\" height=\"60\" rx=\"30\" fill=\"#64ce91\"><\u002Frect>\n      <!-- dumb zone fill -->\n      <rect x=\"676\" y=\"80\" width=\"984\" height=\"60\" fill=\"#fdd761\"><\u002Frect>\n      <rect x=\"1300\" y=\"80\" width=\"360\" height=\"60\" fill=\"#fd6461\"><\u002Frect>\n      <!-- end cap -->\n      <path d=\"M 1640 80 Q 1660 110 1640 140\" fill=\"#fd6461\"><\u002Fpath>\n      <!-- labels -->\n      <text x=\"338\" y=\"120\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#010031\">SMART ZONE<\u002Ftext>\n      <text x=\"1000\" y=\"120\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#010031\">DUMB ZONE<\u002Ftext>\n      <text x=\"1480\" y=\"120\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"26\" font-weight=\"700\" fill=\"#fff\">⚠ degraded<\u002Ftext>\n    <\u002Fsvg>\n    <div class=\"cols cols-3\" style=\"margin-top: 50px;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;\">In smart zone<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px;\">She follows rules. Answers stay sharp.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;\">In dumb zone<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px;\">She ignores stop rules. Invents APIs.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;\">1 M windows?<\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 26px;\">Just a bigger dumb zone. Great for RAG — not for code.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"small\" style=\"margin-top: 28px;\">Source: research.trychroma.com/context-rot<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 11b STATUSLINE ============= -->\n<section data-label=\"11b Statusline\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Your fuel gauge · Claude Code<\u002Fdiv>\n    <h1 class=\"title\">Run <span class=\"kbd\" style=\"font-size: 0.85em;\">/statusline<\u002Fspan>. Watch the bar.<\u002Fh1>\n    <hr class=\"title-rule\">\n\n    <!-- terminal mock -->\n    <div style=\"background: #1a1a1f; border-radius: 12px; padding: 20px 26px; font-family: 'SFMono-Regular', Menlo, Consolas, monospace; box-shadow: 0 18px 60px rgba(0,0,0,0.18); margin-top: 8px;\">\n      <div style=\"display: flex; gap: 8px; margin-bottom: 14px;\">\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #ff5f57;\"><\u002Fspan>\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #febc2e;\"><\u002Fspan>\n        <span style=\"width: 12px; height: 12px; border-radius: 50%; background: #28c840;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"color: #cfcfd4; font-size: 21px; line-height: 1.55;\">\n        <div><span style=\"color: #64ce91;\">❯<\u002Fspan> Refactoring the order-settle handler...<\u002Fdiv>\n        <div style=\"color: #8a8a93;\">  Editing <span style=\"color: #ffec9b;\">src/orders/Settle.cs<\u002Fspan> · +18 −4 · tests ✓<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 16px; padding-top: 14px; border-top: 1px solid #2e2e36; display: flex; align-items: center; gap: 18px; font-size: 20px;\">\n        <span style=\"color: #c89cf5;\">claude-sonnet-4.7<\u002Fspan>\n        <span style=\"color: #4d4d55;\">│<\u002Fspan>\n        <span style=\"color: #64ce91;\">●<\u002Fspan>\n        <span style=\"color: #cfcfd4;\">context<\u002Fspan>\n        <!-- inline bar -->\n        <div style=\"position: relative; width: 280px; height: 14px; background: #2e2e36; border-radius: 7px; overflow: hidden;\">\n          <div style=\"position: absolute; inset: 0 65% 0 0; background: linear-gradient(90deg, #64ce91, #fdd761);\"><\u002Fdiv>\n          <div style=\"position: absolute; left: 35%; top: -2px; bottom: -2px; width: 2px; background: #FC6C54;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"color: #fdd761; font-weight: 700;\">35 %<\u002Fspan>\n        <span style=\"color: #4d4d55;\">│<\u002Fspan>\n        <span style=\"color: #cfcfd4;\">$0.42<\u002Fspan>\n        <span style=\"color: #4d4d55;\">│<\u002Fspan>\n        <span style=\"color: #cfcfd4;\">main<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cols cols-2\" style=\"margin-top: 28px; gap: 36px; align-items: stretch;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px;\">Run this prompt<\u002Fdiv>\n        <div style=\"background: #f3eee0; border-left: 4px solid var(--monterro-orange); border-radius: 6px; padding: 18px 22px; font-family: 'SFMono-Regular', Menlo, Consolas, monospace; font-size: 17px; line-height: 1.5; color: #010031;\">\n          <div style=\"color: #8a8a93; margin-bottom: 6px;\">&gt; /statusline<\u002Fdiv>\n          Make a statusline showing, in order:<br>\n          model · context % (with bar) · cost · branch.<br>\n          <br>\n          Colour the % <span style=\"color: #1a8d4f;\">green &lt; 40 %<\u002Fspan>,<br>\n          <span style=\"color: #b88600;\">amber 40–70 %<\u002Fspan>, <span style=\"color: #c0392b;\">red &gt; 70 %<\u002Fspan>.<br>\n          One line, no emoji.\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 10px;\">What it gives you<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 21px; line-height: 1.5;\">\n          <li><strong>Model<\u002Fstrong> &nbsp;<span class=\"muted\">which brain you're paying for<\u002Fspan><\u002Fli>\n          <li><strong>Context %<\u002Fstrong> &nbsp;<span class=\"muted\">the fuel gauge<\u002Fspan><\u002Fli>\n          <li><strong>Cost<\u002Fstrong> &nbsp;<span class=\"muted\">real-time session spend<\u002Fspan><\u002Fli>\n          <li><strong>Branch<\u002Fstrong> &nbsp;<span class=\"muted\">where the agent is committing<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <p class=\"small\" style=\"margin-top: 14px;\">Saved to <code>.claude/statusline.sh<\u002Fcode> — every future session inherits it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 12 PHASES ============= -->\n<section data-label=\"12 Phases\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">When the task is bigger than the smart zone<\u002Fdiv>\n    <h1 class=\"title\">Phase the task. <span class=\"kbd\" style=\"font-size: 0.85em;\">/clear<\u002Fspan> between. Worktree the independent ones.<\u002Fh1>\n    <hr class=\"title-rule\">\n\n    <!-- Comparison: monolith vs phased -->\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px;\">\n      <!-- Monolith -->\n      <div style=\"background: #fbdcd8; border-radius: 14px; padding: 28px 32px;\">\n        <div style=\"font-size: 20px; font-weight: 700; color: #c0392b; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;\">One big task · single context<\u002Fdiv>\n        <svg viewBox=\"0 0 600 90\" style=\"width: 100%; height: auto;\">\n          <defs>\n            <linearGradient id=\"rotgrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0%\" stop-color=\"#64ce91\"><\u002Fstop>\n              <stop offset=\"35%\" stop-color=\"#fdd761\"><\u002Fstop>\n              <stop offset=\"70%\" stop-color=\"#fd6461\"><\u002Fstop>\n              <stop offset=\"100%\" stop-color=\"#9b1f1d\"><\u002Fstop>\n            <\u002FlinearGradient>\n          <\u002Fdefs>\n          <rect x=\"0\" y=\"20\" width=\"600\" height=\"50\" rx=\"8\" fill=\"url(#rotgrad)\"><\u002Frect>\n          <text x=\"300\" y=\"52\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"22\" font-weight=\"700\" fill=\"#010031\">desk fills · last steps run polluted<\u002Ftext>\n        <\u002Fsvg>\n        <p class=\"body\" style=\"font-size: 22px; margin-top: 18px; color: #010031;\">Wrong architecture defended into the code. Tests skipped. Hallucinated APIs.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Phased -->\n      <div style=\"background: #d8f3e2; border-radius: 14px; padding: 28px 32px;\">\n        <div style=\"font-size: 20px; font-weight: 700; color: #1a8d4f; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;\">Phased · each in smart zone<\u002Fdiv>\n        <svg viewBox=\"0 0 600 90\" style=\"width: 100%; height: auto;\">\n          <rect x=\"0\" y=\"20\" width=\"170\" height=\"50\" rx=\"8\" fill=\"#64ce91\"><\u002Frect>\n          <text x=\"85\" y=\"52\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">Plan · 20 %<\u002Ftext>\n          <text x=\"195\" y=\"55\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\" font-weight=\"700\" fill=\"#FC6C54\">/clear<\u002Ftext>\n          <rect x=\"220\" y=\"20\" width=\"170\" height=\"50\" rx=\"8\" fill=\"#64ce91\"><\u002Frect>\n          <text x=\"305\" y=\"52\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">Build · 20 %<\u002Ftext>\n          <text x=\"415\" y=\"55\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"18\" font-weight=\"700\" fill=\"#FC6C54\">/clear<\u002Ftext>\n          <rect x=\"440\" y=\"20\" width=\"160\" height=\"50\" rx=\"8\" fill=\"#64ce91\"><\u002Frect>\n          <text x=\"520\" y=\"52\" text-anchor=\"middle\" font-family=\"Arial\" font-size=\"20\" font-weight=\"700\" fill=\"#010031\">Verify · 20 %<\u002Ftext>\n        <\u002Fsvg>\n        <p class=\"body\" style=\"font-size: 22px; margin-top: 18px; color: #010031;\">Each phase a fresh desk. Decisions stick. Tests run. Ready for handoff.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Parallel worktrees -->\n    <div style=\"margin-top: 36px; background: #FFEC9B; border-radius: 14px; padding: 26px 32px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 18px; margin-bottom: 18px;\">\n        <div style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.18em; text-transform: uppercase;\">Parallel · git worktrees<\u002Fdiv>\n        <div style=\"font-size: 20px; color: #4a4b5c;\">independent phases, three desks, three PRs, <code>main<\u002Fcode> untouched<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;\">\n        <div style=\"background: rgba(255,255,255,0.6); border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;\">\n          <span style=\"font-size: 22px; font-weight: 700; color: #010031;\">▸ worktree A<\u002Fspan>\n          <span style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange);\">→ PR<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background: rgba(255,255,255,0.6); border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;\">\n          <span style=\"font-size: 22px; font-weight: 700; color: #010031;\">▸ worktree B<\u002Fspan>\n          <span style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange);\">→ PR<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"background: rgba(255,255,255,0.6); border-radius: 10px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;\">\n          <span style=\"font-size: 22px; font-weight: 700; color: #010031;\">▸ worktree C<\u002Fspan>\n          <span style=\"font-size: 20px; font-weight: 700; color: var(--monterro-orange);\">→ PR<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <p class=\"small\" style=\"margin-top: 22px;\">Two wins, one move — <strong style=\"color: var(--monterro-orange);\">quality<\u002Fstrong> (smart zone) + <strong style=\"color: var(--monterro-orange);\">throughput<\u002Fstrong> (parallel). One human supervises 3–4 phased agents.<\u002Fp>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 13 CLEAN DESK / clear vs compact ============= -->\n<section data-label=\"13 Clear vs compact\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Two commands, one mental model<\u002Fdiv>\n    <h1 class=\"title\">Keep the desk clean.<\u002Fh1>
