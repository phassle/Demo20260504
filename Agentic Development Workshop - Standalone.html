 \n    <div class=\"cols cols-2\" style=\"margin-top: 36px; gap: 56px;\">\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Jira or GitHub — same role<\u002Fh3>\n        <ul class=\"clean\">\n          <li>The <strong>issue<\u002Fstrong> is the contract — whichever tracker you use<\u002Fli>\n          <li>BDD lives <em>inside<\u002Fem> the issue, not in a separate doc<\u002Fli>\n          <li>One issue → one branch → one PR → close. No long-lived spec branches<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Parallelism, in real terms<\u002Fh3>\n        <ul class=\"clean\">\n          <li>Once the unblocking slice merges, assign #2 and #4 to <strong>two different Copilot agents<\u002Fstrong><\u002Fli>\n          <li>You're reviewing PRs, not driving keystrokes<\u002Fli>\n          <li>That's the DAG paying off — graph, not queue<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Frect><\u002Fpath><\u002Frect><\u002Fpath><\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44g2 STEP 4 — implement (AFK) ============= -->\n<section data-label=\"51 Step 4 implement\" data-step4=\"\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 4 · implement<\u002Fdiv>\n    <h1 class=\"title\">Now it's <span class=\"orange\">AFK.<\u002Fspan> One agent per issue, fresh context each time.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <pre class=\"code\" style=\"font-size: 22px;\"><span class=\"c-com\">// Per issue<\u002Fspan>\n1. <span class=\"c-key\">/clear<\u002Fspan>                <span class=\"c-com\">← back to Momento<\u002Fspan>\n2. read AGENTS.md       <span class=\"c-com\">← onboard<\u002Fspan>\n3. read issue           <span class=\"c-com\">← the destination<\u002Fspan>\n4. plan → implement → test\n5. open PR\n6. <span class=\"c-key\">close<\u002Fspan> issue          <span class=\"c-com\">← spec frozen<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">What makes this AFK-safe<\u002Fh3>\n        <ul class=\"clean\">\n          <li><strong>The issue is the contract.<\u002Fstrong> If grill-me did its job, the agent isn't guessing<\u002Fli>\n          <li><strong>Stop hooks run build + tests.<\u002Fstrong> No \"works on my machine\" PRs<\u002Fli>\n          <li><strong>Fresh context per issue.<\u002Fstrong> No sediment from the previous slice<\u002Fli>\n          <li><strong>Vertical slice = working software<\u002Fstrong> at the end of every issue<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 28px;\">\n          You're not watching it type. You're reviewing PRs.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 44h STEP 5 — review & close ============= -->\n<section data-label=\"52 Step 5 review\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Step 5 · review &amp; close<\u002Fdiv>\n    <h1 class=\"title\">Code is your <span class=\"orange\">battleground.<\u002Fspan> Don't skip the review.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Read the diff, not the spec<\u002Fh3>\n        <ul class=\"clean\">\n          <li>The PRD was a destination. The diff is what shipped<\u002Fli>\n          <li>Bad codebases produce bad agents — don't let entropy in<\u002Fli>\n          <li>Catch drift at the PR, not three slices later<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">Close ruthlessly<\u002Fh3>\n        <ul class=\"clean\">\n          <li>PR merges → <strong>close the issue<\u002Fstrong><\u002Fli>\n          <li>If the spec lived in the repo, <strong>delete it<\u002Fstrong><\u002Fli>\n          <li>Future change → <strong>new issue<\u002Fstrong>, not edits to the old one<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 28px;\">\n          Closed tickets are a perfect record of what the system was at that moment. The \"living spec\" anti-pattern is sidestepped entirely.\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 53 LINEAR QUALITY WEDNESDAYS ============= -->\n<section data-label=\"53 Quality Wednesdays\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Linear · Thomas Kessler · 2026<\u002Fdiv>\n    <h1 class=\"title\">One day a week, every dev brings <span class=\"orange\">one quality fix.<\u002Fspan><\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <p class=\"body\" style=\"font-size: 26px;\">Every Wednesday, Linear's ~25-engineer team joins a <strong>30-minute call<\u002Fstrong>. Each engineer demos one quality fix they made that week.<\u002Fp>\n        <p class=\"body\" style=\"font-size: 24px; margin-top: 16px; color: var(--fg2);\">Range: 1-pixel UI tweak → backend perf win. ~2 min each. Boom-boom-boom.<\u002Fp>\n        <pre class=\"code\" style=\"font-size: 22px; margin-top: 20px;\"><span class=\"c-com\">Rule:<\u002Fspan> you have to FIND your own fix.\n      no one hands them to you.\n      you hunt.<\u002Fpre>\n        <p class=\"body\" style=\"font-size: 22px; margin-top: 20px; color: var(--fg2);\">Linear has fixed <strong>2 500–3 000<\u002Fstrong> small quality details since starting the practice.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h3 style=\"font-size: 26px; color: var(--monterro-navy); margin-bottom: 14px;\">The side effect — not the meeting<\u002Fh3>\n        <div class=\"pullquote\" style=\"font-size: 28px; margin-top: 8px; max-width: 100%;\">\n          \"Everybody was always on the lookout for small quality fixes, even when building totally unrelated features. They knew they had to come to the next Wednesday meeting with a fix. <span class=\"orange\">So they introduced fewer regressions in the first place.<\u002Fspan>\"\n        <\u002Fdiv>\n        <p class=\"body\" style=\"font-size: 20px; margin-top: 12px; color: var(--fg2); text-align: right;\">— Thomas Kessler, Linear<\u002Fp>\n        <div class=\"callout\" style=\"margin-top: 28px;\">\n          A weekly 15-minute slot. Every dev brings one self-found improvement. <span class=\"accent\">The cheapest quality ratchet you can install on Monday morning.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 45 RESOURCES ============= -->\n<section data-label=\"45 Resources\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Resources<\u002Fdiv>\n    <h1 class=\"title\">Where to go next.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <div class=\"cols cols-2\" style=\"margin-top: 8px; gap: 56px;\">\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;\">Install Matt Pocock's skills · 30-second setup<\u002Fdiv>\n        <ol class=\"clean\" style=\"font-size: 22px; padding-left: 28px;\">\n          <li style=\"font-size: 22px; margin-bottom: 8px;\">Run the installer:<br><span class=\"kbd\" style=\"font-size: 18px;\">npx skills@latest add mattpocock/skills<\u002Fspan><\u002Fli>\n          <li style=\"font-size: 22px; margin-bottom: 8px;\">Pick the skills + agents to install onto. <strong>Include <span class=\"kbd\" style=\"font-size: 17px;\">/setup-matt-pocock-skills<\u002Fspan><\u002Fstrong>.<\u002Fli>\n          <li style=\"font-size: 22px; margin-bottom: 8px;\">Run <span class=\"kbd\" style=\"font-size: 17px;\">/setup-matt-pocock-skills<\u002Fspan> in your agent — it asks for issue tracker (GitHub / Linear / local), triage labels, doc location.<\u002Fli>\n          <li style=\"font-size: 22px;\">Repo + write-up: <span class=\"kbd\" style=\"font-size: 17px;\">github.com/mattpocock/skills<\u002Fspan> · <span class=\"kbd\" style=\"font-size: 17px;\">aihero.dev/grill-me-skill<\u002Fspan><\u002Fli>\n        <\u002Fol>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin: 32px 0 14px;\">Foundations<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 24px;\">\n          <li style=\"font-size: 24px;\">AGENTS.md spec: <span class=\"kbd\" style=\"font-size: 18px;\">agents.md<\u002Fspan><\u002Fli>\n          <li style=\"font-size: 24px;\">Red Hat 4.4× study: <span class=\"kbd\" style=\"font-size: 18px;\">developers.redhat.com<\u002Fspan><\u002Fli>\n          <li style=\"font-size: 24px;\">Chroma context-rot: <span class=\"kbd\" style=\"font-size: 18px;\">research.trychroma.com/context-rot<\u002Fspan><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px;\">SDD frameworks · the landscape<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 24px;\">\n          <li style=\"font-size: 24px;\"><strong>GitHub Spec Kit<\u002Fstrong> — Delimarsky / GitHub. Spec → plan → tasks → code.<\u002Fli>\n          <li style=\"font-size: 24px;\"><strong>GSD<\u002Fstrong> (Get Stuff Done) — community framework, opinionated agent loop.<\u002Fli>\n          <li style=\"font-size: 24px;\"><strong>BMAD-Method<\u002Fstrong> — agentic agile, role-based agents.<\u002Fli>\n          <li style=\"font-size: 24px;\"><em>Pocock's take:<\u002Fem> small, composable skills &gt; full framework lock-in.<\u002Fli>\n        <\u002Ful>\n        <div class=\"h\" style=\"font-size: 22px; font-weight: 700; color: var(--monterro-orange); letter-spacing: 0.12em; text-transform: uppercase; margin: 32px 0 14px;\">BDD pipeline<\u002Fdiv>\n        <ul class=\"clean\" style=\"font-size: 24px;\">\n          <li style=\"font-size: 24px;\">Granados — <em>BDD in the age of AI Coding Agents<\u002Fem><\u002Fli>\n          <li style=\"font-size: 24px;\">GitHub Copilot agent mode + prompt files<\u002Fli>\n          <li style=\"font-size: 24px;\">Cucumber · SpecFlow (.NET)<\u002Fli>\n        <\u002Ful>\n        <div class=\"callout\" style=\"margin-top: 36px; background: var(--monterro-navy); color: var(--monterro-offwhite);\">\n          Find me on <strong>Discord<\u002Fstrong> (Monterro Infuse AI) or <strong>email<\u002Fstrong> — <span style=\"color: var(--monterro-orange);\">per.hassle@monterro.com<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 46 SHOULDERS ============= -->\n<section data-label=\"46 Shoulders\">\n  <div class=\"frame\">\n    <div class=\"eyebrow\">Built on these shoulders<\u002Fdiv>\n    <h1 class=\"title\">Nothing today is original.<\u002Fh1>\n    <hr class=\"title-rule\">\n    <table class=\"t dense\">\n      <thead><tr><th style=\"width: 50%;\">Source · year<\u002Fth><th>Where today<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><strong>\"Attention Is All You Need\"<\u002Fstrong> — Vaswani et al. <em>(2017)<\u002Fem><\u002Ftd><td>Block 1 (n² scaling)<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Agent = Model + Harness<\u002Fstrong> — Hashimoto · Fowler <em>(2026)<\u002Fem><\u002Ftd><td>Block 1 (harness framing)<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Context Rot research<\u002Fstrong> — Chroma <em>(2025)<\u002Fem><\u002Ftd><td>Block 1 (40 % threshold)<\u002Ftd><\u002Ftr>\n        <tr><td><strong>AGENTS.md spec<\u002Fstrong> — AAIF / Linux Foundation <em>(2025)<\u002Fem><\u002Ftd><td>Block 2<\u002Ftd><\u002Ftr>\n        <tr><td><strong>AGENTS.md 4.4× study<\u002Fstrong> — Red Hat <em>(Apr 2026)<\u002Fem><\u002Ftd><td>Block 2<\u002Ftd><\u002Ftr>\n        <tr><td><strong>mattpocock/skills<\u002Fstrong> — Matt Pocock <em>(2026)<\u002Fem><\u002Ftd><td>Block 3 + afternoon<\u002Ftd><\u002Ftr>\n        <tr><td><strong>GitHub Spec Kit (SDD)<\u002Fstrong> — Delimarsky / GitHub <em>(2026)<\u002Fem><\u002Ftd><td>Block 4 + afternoon<\u002Ftd><\u002Ftr>\n        <tr><td><strong>GSD · BMAD-Method<\u002Fstrong> — community SDD frameworks <em>(2025–26)<\u002Fem><\u002Ftd><td>Landscape · afternoon<\u002Ftd><\u002Ftr>\n        <tr><td><strong>Domain-Driven Design<\u002Fstrong> — Evans <em>(2003)<\u002Fem><\u002Ftd><td>grill-me adjacent<\u002Ftd><\u002Ftr>\n        <tr><td><strong>BDD<\u002Fstrong> — North <em>(2003)<\u002Fem> · <strong>TDD<\u002Fstrong> — Beck <em>(2002)<\u002Fem><\u002Ftd><td>Afternoon Block 7<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"callout\" style=\"margin-top: 32px; text-align: center;\">\n      The job today wasn't to invent. <span class=\"accent\">It was to integrate.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 47 Q&A ============= -->\n<section data-label=\"47 Q&amp;A\">\n  <div class=\"frame\" style=\"justify-content: center;\">\n    <div class=\"cols cols-2\" style=\"gap: 80px; align-items: center;\">\n      <div>\n        <span class=\"label-tag label-question\">Q&amp;A<\u002Fspan>\n        <h1 class=\"title\" style=\"font-size: 140px; font-weight: 300; margin-top: 24px;\">Ask anything.<\u002Fh1>\n        <hr class=\"title-rule\" style=\"width: 240px;\">\n        <p class=\"body\" style=\"font-size: 36px; color: var(--fg2); font-style: italic;\">The agent will, too.<\u002Fp>\n        <p class=\"body\" style=\"font-size: 30px; color: var(--monterro-navy); margin-top: 48px; font-weight: 600;\">Scan the QR or use the link to join →<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; align-items: center; justify-content: center;\">\n        <img src=\"36c07fa7-1c6a-4f7c-9750-c2acfa6b87a9\" alt=\"QR code to join Q&amp;A\" style=\"width: 480px; height: auto; border-radius: 24px; box-shadow: 0 8px 32px rgba(1, 0, 49, 0.12);\">\n        <p class=\"body\" style=\"font-size: 26px; color: var(--monterro-navy); margin-top: 24px; font-weight: 700; letter-spacing: 0.02em;\">forms.office.com/e/rY9rE8gHrY<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <img src=\"8eb9d228-59d0-4f8e-ad0b-b25fc608f5da\" alt=\"\" class=\"logo-tr\">\n<\u002Fsection>\n\n<!-- ============= 48 THANK YOU ============= -->\n<section data-label=\"48 Thank you\" class=\"cover\">\n  <div class=\"frame\">\n    <div style=\"max-width: 1300px;\">\n      <div class=\"eyebrow\" style=\"color: #ffec9b; font-size: 26px;\">Per Hassle &nbsp;·&nbsp; Monterro<\u002Fdiv>\n      <h1 class=\"title\">Thank you.<\u002Fh1>\n      <h2 class=\"subtitle\">Let's go ship something.<\u002Fh2>\n      <p class=\"body\" style=\"font-size: 28px; color: var(--monterro-offwhite); opacity: 0.9; margin-top: 60px;\">\n        per.hassle@monterro.com &nbsp;·&nbsp; +46 703 93 93 33\n      <\u002Fp>\n      <div style=\"margin-top: 60px; display: grid; grid-template-columns: auto 1fr; gap: 14px 28px; align-items: center; max-width: 1200px;\">\n        <div style=\"font-size: 24px; color: #ffec9b; font-weight: 700;\">GitHub<\u002Fdiv>\n
